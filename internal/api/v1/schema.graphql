}

"Sorting options for identities list."
input IdentitiesSort {
  "Which field to sort by"
  field: IdentitiesSortField!

  "Sort direction"
  order: SortOrder!
}

"Sorting options for invites list."
input InvitesSort {
  "Which field to sort by"
  field: InvitesSortField!

  "Sort direction"
  order: SortOrder!
}

"Billing information for an organization."
type ViewerOrganizationBilling {
  "Current billing status"
