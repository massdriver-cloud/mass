"Information about the authenticated user."
type AccountViewer {
  id: ID!

  "Email address"
  email: String!

  "First name"
  firstName: String

  "Last name"
  lastName: String

  "When you signed up (UTC)"
  createdAt: DateTime!

  "When your profile was last updated (UTC)"
  updatedAt: DateTime!

  "Your profile avatar."
  avatar: AvatarViewer

  "Organizations you belong to."
  organizations(
    "How to sort results"
    sort: ViewerOrganizationsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): ViewerOrganizationsPage

  "Your most recently joined organization. Useful for setting a default context."
  defaultOrganization: ViewerOrganization

  "OAuth\/OIDC identities linked to your account."
  identities(
    "How to sort"
    sort: IdentitiesSort

    "Pagination cursor"
    cursor: Cursor
  ): IdentitiesViewerPage

  "Pending group membership invitations."
  invites(
    "How to sort"
    sort: InvitesSort

    "Pagination cursor"
    cursor: Cursor
  ): InvitesViewerPage
}

