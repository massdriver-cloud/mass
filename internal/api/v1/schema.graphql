schema {
  mutation: RootMutationType
  query: RootQueryType
}

"Links a mutation to its JSON Schema and UI Schema for form generation"
directive @inputs(
  "URL to the UI Schema"
  ui: String!

  "URL to the JSON Schema"
  schema: String!

  "Schema name matching the mutation (e.g., createProject)"
  name: String!
) on FIELD_DEFINITION

type RootQueryType {
  "List all projects you have access to. Returns a paginated list sorted by name."
  projects(
    "Your organization ID"
    organizationId: ID!

    "How to sort results"
    sort: ProjectsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): ProjectsPage

  "Get a single project by its ID."
  project(
    "Your organization ID"
    organizationId: ID!

    "The project ID"
    id: ID!
  ): Project

  "List all environments you have access to. Returns a paginated list sorted by name."
  environments(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: EnvironmentsFilter

    "How to sort results"
    sort: EnvironmentsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): EnvironmentsPage

  "Get a single environment by its ID."
  environment(
    "Your organization ID"
    organizationId: ID!

    "The environment ID"
    id: ID!
  ): Environment

  "List all instances you have access to. Returns a paginated list sorted by name."
  instances(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: InstancesFilter

    "How to sort results"
    sort: InstancesSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): InstancesPage

  "Get a single instance by its ID."
  instance(
    "Your organization ID"
    organizationId: ID!

    "The instance ID"
    id: ID!
  ): Instance

  """
  Get the configuration fields available across your instances.

  Returns all the unique fields from your instance configurations that you can
  use to build search filters or dashboards. For example, if your instances have
  'database.instance_type' or 'cluster.node_count' fields, they'll appear here.
  """
  paramDimensions(
    "Your organization ID"
    organizationId: ID!

    "Scope which instances' schemas to introspect"
    filter: ParamDimensionsFilter

    "How to sort results"
    sort: ParamDimensionsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): ParamDimensionsPage

  "List all deployments you have access to. Returns a paginated list, newest first."
  deployments(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: DeploymentsFilter

    "How to sort results"
    sort: DeploymentsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): DeploymentsPage

  "Get a single deployment by its ID."
  deployment(
    "Your organization ID"
    organizationId: ID!

    "The deployment ID"
    id: ID!
  ): Deployment

  """
  Get a bundle by its identifier.

  The ID format is `name@version` where version can be an exact version,
  a constraint, or a channel:

  - `aws-aurora-postgres@1.2.3` — exact version
  - `aws-aurora-postgres@~1.2` — latest patch in 1.2.x
  - `aws-aurora-postgres@~1` — latest minor in 1.x.x
  - `aws-aurora-postgres@latest` — newest stable release
  - `aws-aurora-postgres@latest+dev` — newest release including dev builds
  - `aws-aurora-postgres` — shorthand for `name@latest`
  """
  bundle(
    "Your organization ID"
    organizationId: ID!

    "Bundle identifier (e.g., 'aws-aurora-postgres@1.2.3' or 'aws-aurora-postgres@latest')"
    id: BundleId!
  ): Bundle

  "List all groups in your organization. Returns a paginated list."
  groups(
    "Your organization ID"
    organizationId: ID!

    "How to sort results"
    sort: GroupsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): GroupsPage

  "Get a single group by its ID."
  group(
    "Your organization ID"
    organizationId: ID!

    "The group ID"
    id: ID!
  ): Group

  "Get your organization and its settings."
  organization(
    "Your organization ID"
    organizationId: ID!
  ): Organization

  "Get information about yourself (the authenticated user or service account)."
  viewer: Viewer

  "Get server info and available authentication methods. No authentication required."
  server: Server!

  "List all supported integration types. Use these to discover what integrations are available and their configuration schemas."
  integrationTypes(
    "Your organization ID"
    organizationId: ID!
  ): IntegrationTypesPage

  "List your organization's configured integrations."
  integrations(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: IntegrationsFilter

    "How to sort results"
    sort: IntegrationsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): IntegrationsPage

  "Get a single integration by its type ID."
  integration(
    "Your organization ID"
    organizationId: ID!

    "The integration type ID (e.g., 'aws-cost-and-usage-reports')"
    id: ID!
  ): Integration

  "List audit log events for your organization. Returns newest first by default."
  auditLogs(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: AuditLogsFilter

    "How to sort results"
    sort: AuditLogsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): AuditLogsPage

  "Get a single audit log event by its ID."
  auditLog(
    "Your organization ID"
    organizationId: ID!

    "The audit log event ID"
    id: ID!
  ): AuditLog
}

type RootMutationType {
  "Create a new project in your organization."
  createProject(
    "Your organization ID"
    organizationId: ID!

    "Create a new project. A project is the complete model of your application—its infrastructure, architecture, configurations, and environments."
    input: CreateProjectInput!
  ): ProjectPayload @inputs(name: "createProject", schema: "\/graphql\/v1\/inputs\/createProject.json", ui: "\/graphql\/v1\/inputs\/createProject.ui.json")

  "Update a project's name or description."
  updateProject(
    "Your organization ID"
    organizationId: ID!

    "The project ID to update"
    id: ID!

    "Update an existing project's name and description. The ID cannot be changed after creation."
    input: UpdateProjectInput!
  ): ProjectPayload @inputs(name: "updateProject", schema: "\/graphql\/v1\/inputs\/updateProject.json", ui: "\/graphql\/v1\/inputs\/updateProject.ui.json")

  "Delete a project. You must delete all environments first."
  deleteProject(
    "Your organization ID"
    organizationId: ID!

    "The project ID to delete"
    id: ID!
  ): ProjectPayload

  "Create a new environment in a project."
  createEnvironment(
    "Your organization ID"
    organizationId: ID!

    "The project to create the environment in"
    projectId: ID!

    "Create a new environment. Environments are isolated deployment contexts like production, staging, or development, each with independent secrets and configurations."
    input: CreateEnvironmentInput!
  ): EnvironmentPayload @inputs(name: "createEnvironment", schema: "\/graphql\/v1\/inputs\/createEnvironment.json", ui: "\/graphql\/v1\/inputs\/createEnvironment.ui.json")

  "Update an environment's name or description."
  updateEnvironment(
    "Your organization ID"
    organizationId: ID!

    "The environment ID to update"
    id: ID!

    "Update an existing environment's name and description. The ID cannot be changed after creation."
    input: UpdateEnvironmentInput!
  ): EnvironmentPayload @inputs(name: "updateEnvironment", schema: "\/graphql\/v1\/inputs\/updateEnvironment.json", ui: "\/graphql\/v1\/inputs\/updateEnvironment.ui.json")

  "Delete an environment. You must decommission all packages first."
  deleteEnvironment(
    "Your organization ID"
    organizationId: ID!

    "The environment ID to delete"
    id: ID!
  ): EnvironmentPayload

  "Add a component to a project's blueprint."
  addComponent(
    "Your organization ID"
    organizationId: ID!

    "The project ID"
    projectId: ID!

    "Add an infrastructure component to a project's blueprint. Each component is a specific instance of a bundle (like a Redis cache or PostgreSQL database) that composes with other components to form your application."
    input: AddComponentInput!
  ): ComponentPayload @inputs(name: "addComponent", schema: "\/graphql\/v1\/inputs\/addComponent.json", ui: "\/graphql\/v1\/inputs\/addComponent.ui.json")

  "Remove a component from a project's blueprint."
  removeComponent(
    "Your organization ID"
    organizationId: ID!

    "The project ID"
    projectId: ID!

    "The component ID to remove"
    id: ID!
  ): ComponentPayload

  "Create a link between two components."
  linkComponents(
    "Your organization ID"
    organizationId: ID!

    "The project ID"
    projectId: ID!

    "Create a link between two components in a project's blueprint. Links connect an output field on the source component to an input field on the destination component, establishing data flow between infrastructure resources."
    input: LinkComponentsInput!
  ): LinkPayload @inputs(name: "linkComponents", schema: "\/graphql\/v1\/inputs\/linkComponents.json", ui: "\/graphql\/v1\/inputs\/linkComponents.ui.json")

  "Remove a link between two components."
  unlinkComponents(
    "Your organization ID"
    organizationId: ID!

    "The link ID to remove"
    id: ID!
  ): LinkPayload

  "Set the position of a component on the canvas."
  setComponentPosition(
    "Your organization ID"
    organizationId: ID!

    "The project ID"
    projectId: ID!

    "The component ID"
    id: ID!

    "Set the position of a component on the canvas."
    input: SetComponentPositionInput!
  ): ComponentPayload @inputs(name: "setComponentPosition", schema: "\/graphql\/v1\/inputs\/setComponentPosition.json", ui: "\/graphql\/v1\/inputs\/setComponentPosition.ui.json")

  "Accept a pending group invitation."
  acceptGroupInvite(
    "The invitation ID to accept"
    id: ID!
  ): InviteViewerPayload

  "Upload or replace your profile avatar. Accepts PNG, JPG, GIF, or WebP (max 1 MB)."
  setAccountAvatar(
    "The image file to upload"
    avatar: Upload!
  ): AvatarViewerPayload

  "Remove your profile avatar."
  removeAccountAvatar: AvatarViewerPayload

  "Create a new group in your organization."
  createGroup(
    "Your organization ID"
    organizationId: ID!

    "Create a new group. Groups control which projects members can access."
    input: CreateGroupInput!
  ): GroupPayload @inputs(name: "createGroup", schema: "\/graphql\/v1\/inputs\/createGroup.json", ui: "\/graphql\/v1\/inputs\/createGroup.ui.json")

  "Update a group's name or description."
  updateGroup(
    "Your organization ID"
    organizationId: ID!

    "The group ID to update"
    id: ID!

    "Update a group's name or description."
    input: UpdateGroupInput!
  ): GroupPayload @inputs(name: "updateGroup", schema: "\/graphql\/v1\/inputs\/updateGroup.json", ui: "\/graphql\/v1\/inputs\/updateGroup.ui.json")

  "Delete a custom group. Predefined organization groups cannot be deleted."
  deleteGroup(
    "Your organization ID"
    organizationId: ID!

    "The group ID to delete"
    id: ID!
  ): GroupPayload

  "Invite a user to a group by email address."
  createGroupInvitation(
    "Your organization ID"
    organizationId: ID!

    "The group ID to invite the user to"
    groupId: ID!

    "Email address of the user to invite"
    email: String!
  ): GroupInvitationPayload

  "Remove a pending invitation from a group."
  deleteGroupInvitation(
    "Your organization ID"
    organizationId: ID!

    "The group ID"
    groupId: ID!

    "Email address of the invitation to remove"
    email: String!
  ): GroupInvitationPayload

  "Remove a member from a group."
  deleteGroupMember(
    "Your organization ID"
    organizationId: ID!

    "The group ID"
    groupId: ID!

    "Email address of the member to remove"
    email: String!
  ): GroupMemberPayload

  "Create a new tag constraint in your organization."
  createOrganizationTagConstraint(
    "Your organization ID"
    organizationId: ID!

    "Define a structural tag constraint for your organization. Tag constraints control which tags can be set on resources at each level of the hierarchy."
    input: CreateOrganizationTagConstraintInput!
  ): OrganizationTagConstraintPayload @inputs(name: "createOrganizationTagConstraint", schema: "\/graphql\/v1\/inputs\/createOrganizationTagConstraint.json", ui: "\/graphql\/v1\/inputs\/createOrganizationTagConstraint.ui.json")

  "Delete a tag constraint from your organization."
  deleteOrganizationTagConstraint(
    "Your organization ID"
    organizationId: ID!

    "The tag constraint ID to delete"
    id: ID!
  ): OrganizationTagConstraintPayload

  "Create a new organization. You become the owner and first admin."
  createOrganization(
    "Create a new organization. An organization is the top-level container for all your projects, environments, and infrastructure resources."
    input: CreateOrganizationInput!
  ): OrganizationPayload @inputs(name: "createOrganization", schema: "\/graphql\/v1\/inputs\/createOrganization.json", ui: "\/graphql\/v1\/inputs\/createOrganization.ui.json")

  "Upload or replace your organization's logo. Accepts PNG, JPG, GIF, or WebP (max 1 MB)."
  setOrganizationLogo(
    "Your organization ID"
    organizationId: ID!

    "The image file to upload"
    logo: Upload!
  ): LogoOrganizationPayload

  "Remove your organization's logo."
  removeOrganizationLogo(
    "Your organization ID"
    organizationId: ID!
  ): LogoOrganizationPayload

  "Remove a member from the organization. Deletes all group memberships and pending invitations."
  deleteOrganizationMember(
    "Your organization ID"
    organizationId: ID!

    "Email address of the member to remove"
    email: String!
  ): DeletedOrganizationMemberPayload

  "Create and activate an integration for your organization."
  createIntegration(
    "Your organization ID"
    organizationId: ID!

    "The integration type to configure (e.g., 'aws-cost-and-usage-reports')"
    id: ID!

    "Create and activate an integration for your organization. The config and auth payloads must conform to the integration type's configSchema and authSchema respectively."
    input: CreateIntegrationInput!
  ): IntegrationActivationPayload @inputs(name: "createIntegration", schema: "\/graphql\/v1\/inputs\/createIntegration.json", ui: "\/graphql\/v1\/inputs\/createIntegration.ui.json")

  "Delete an integration. This disables it first, then removes the configuration."
  deleteIntegration(
    "Your organization ID"
    organizationId: ID!

    "The integration type ID to delete"
    id: ID!
  ): IntegrationPayload

  "Create a scoped, time-limited access token. The token value is only returned in this response."
  createAccessToken(
    "Your organization ID"
    organizationId: ID!

    "Create a scoped, time-limited access token for API authentication."
    input: CreateAccessTokenInput!
  ): AccessTokenWithValuePayload @inputs(name: "createAccessToken", schema: "\/graphql\/v1\/inputs\/createAccessToken.json", ui: "\/graphql\/v1\/inputs\/createAccessToken.ui.json")

  "Revoke an access token. The token immediately stops working but the record is preserved for audit."
  revokeAccessToken(
    "Your organization ID"
    organizationId: ID!

    "The access token ID to revoke"
    id: ID!
  ): AccessTokenPayload

  "Create a new service account. The secret token is only returned in this response."
  createServiceAccount(
    "Your organization ID"
    organizationId: ID!

    "Create a new service account for programmatic API access."
    input: CreateServiceAccountInput!
  ): ServiceAccountWithSecretPayload @inputs(name: "createServiceAccount", schema: "\/graphql\/v1\/inputs\/createServiceAccount.json", ui: "\/graphql\/v1\/inputs\/createServiceAccount.ui.json")

  "Delete a service account. This action cannot be undone."
  deleteServiceAccount(
    "Your organization ID"
    organizationId: ID!

    "The service account ID to delete"
    id: ID!
  ): ServiceAccountPayload

  "Add a service account to a group, granting it the group's access level."
  addServiceAccountToGroup(
    "Your organization ID"
    organizationId: ID!

    "The service account ID"
    serviceAccountId: ID!

    "The group ID to add the service account to"
    groupId: ID!
  ): ServiceAccountGroupPayload

  "Remove a service account from a group."
  removeServiceAccountFromGroup(
    "Your organization ID"
    organizationId: ID!

    "The service account ID"
    serviceAccountId: ID!

    "The group ID to remove the service account from"
    groupId: ID!
  ): ServiceAccountGroupPayload

  """
  Set a remote reference on an instance.

  Links an instance's resource field to a resource from another project or
  an imported resource. The instance must not be in a provisioned or failed state.
  """
  setRemoteReference(
    "Your organization ID"
    organizationId: ID!

    "Link an instance's resource field to a resource from another project or an imported resource. The instance must not be in a provisioned or failed state."
    input: SetRemoteReferenceInput!
  ): RemoteReferencePayload @inputs(name: "setRemoteReference", schema: "\/graphql\/v1\/inputs\/setRemoteReference.json", ui: "\/graphql\/v1\/inputs\/setRemoteReference.ui.json")

  """
  Remove a remote reference from an instance.

  The reference can only be removed if no provisioned instances are connected
  through it. Removing the last remote reference resets the instance status
  from EXTERNAL back to INITIALIZED.
  """
  removeRemoteReference(
    "Your organization ID"
    organizationId: ID!

    "Remove a remote reference from an instance. The reference can only be removed if no provisioned instances are connected through it."
    input: RemoveRemoteReferenceInput!
  ): RemoteReferencePayload @inputs(name: "removeRemoteReference", schema: "\/graphql\/v1\/inputs\/removeRemoteReference.json", ui: "\/graphql\/v1\/inputs\/removeRemoteReference.ui.json")
}

"Link an instance's resource field to a resource from another project or an imported resource. The instance must not be in a provisioned or failed state."
input SetRemoteReferenceInput {
  "The resource field to assign the reference to"
  field: String!

  "The instance to set the remote reference on"
  instanceId: ID!

  "The resource to reference — either a UUID for imported resources or 'instance.field' for provisioned resources"
  resourceId: ID!
}

"Remove a remote reference from an instance. The reference can only be removed if no provisioned instances are connected through it."
input RemoveRemoteReferenceInput {
  "The resource field to remove the reference from"
  field: String!

  "The instance the reference belongs to"
  instanceId: ID!
}

"A remote reference linking an instance to an external resource."
type RemoteReference {
  "Unique identifier"
  id: ID!

  "The resource field this reference is assigned to"
  field: String!

  "When this remote reference was created (UTC)"
  createdAt: DateTime!

  "When this remote reference was last modified (UTC)"
  updatedAt: DateTime!

  "The external resource this reference points to."
  resource: Resource!
}

type RemoteReferencePayload {
  "Indicates if the mutation completed successfully or not."
  successful: Boolean!

  "A list of failed validations. May be blank or null if mutation succeeded."
  messages: [ValidationMessage]

  "The object created\/updated\/deleted by the mutation. May be null if mutation failed."
  result: RemoteReference
}

"A service account."
type ServiceAccount {
  "Service account identifier"
  id: ID!

  "Service account name"
  name: String!

  "What this service account is for"
  description: String

  "When this service account was created (UTC)"
  createdAt: DateTime!

  "When this service account was last modified (UTC)"
  updatedAt: DateTime!
}

"A service account with its secret token. The secret is only visible on creation."
type ServiceAccountWithSecret {
  "Service account identifier"
  id: ID!

  "Service account name"
  name: String!

  "What this service account is for"
  description: String

  "Secret token for authentication. Only returned on creation."
  secret: String!

  "When this service account was created (UTC)"
  createdAt: DateTime!

  "When this service account was last modified (UTC)"
  updatedAt: DateTime!
}

type ServiceAccountPayload {
  "Indicates if the mutation completed successfully or not."
  successful: Boolean!

  "A list of failed validations. May be blank or null if mutation succeeded."
  messages: [ValidationMessage]

  "The object created\/updated\/deleted by the mutation. May be null if mutation failed."
  result: ServiceAccount
}

type ServiceAccountWithSecretPayload {
  "Indicates if the mutation completed successfully or not."
  successful: Boolean!

  "A list of failed validations. May be blank or null if mutation succeeded."
  messages: [ValidationMessage]

  "The object created\/updated\/deleted by the mutation. May be null if mutation failed."
  result: ServiceAccountWithSecret
}

type ServiceAccountGroupPayload {
  "Indicates if the mutation completed successfully or not."
  successful: Boolean!

  "A list of failed validations. May be blank or null if mutation succeeded."
  messages: [ValidationMessage]

  "The object created\/updated\/deleted by the mutation. May be null if mutation failed."
  result: ServiceAccount
}

"Create a new service account for programmatic API access."
input CreateServiceAccountInput {
  "What this service account is used for"
  description: String

  "A human-readable name for the service account"
  name: String!
}

"An access token with the raw token value. Only returned on creation."
type AccessTokenWithValue {
  "Access token identifier"
  id: ID!

  "Label for this token"
  name: String!

  "The full token value. Store securely — this is the only time it is shown."
  token: String!

  "Short prefix for identifying this token in lists (e.g., md_a1b2c3d4)"
  prefix: String!

  "Permission scopes granted to this token"
  scopes: [String!]!

  "When this token expires (UTC)"
  expiresAt: DateTime!

  "When this token was created (UTC)"
  createdAt: DateTime!
}

"An access token's metadata. Does not include the raw token value."
type AccessToken {
  "Access token identifier"
  id: ID!

  "Label for this token"
  name: String!

  "Short prefix for identifying this token (e.g., md_a1b2c3d4)"
  prefix: String!

  "Permission scopes granted to this token"
  scopes: [String!]!

  "When this token expires (UTC)"
  expiresAt: DateTime!

  "When this token was revoked, if applicable (UTC)"
  revokedAt: DateTime

  "When this token was last used for authentication (UTC)"
  lastUsedAt: DateTime

  "When this token was created (UTC)"
  createdAt: DateTime!
}

type AccessTokenWithValuePayload {
  "Indicates if the mutation completed successfully or not."
  successful: Boolean!

  "A list of failed validations. May be blank or null if mutation succeeded."
  messages: [ValidationMessage]

  "The object created\/updated\/deleted by the mutation. May be null if mutation failed."
  result: AccessTokenWithValue
}

type AccessTokenPayload {
  "Indicates if the mutation completed successfully or not."
  successful: Boolean!

  "A list of failed validations. May be blank or null if mutation succeeded."
  messages: [ValidationMessage]

  "The object created\/updated\/deleted by the mutation. May be null if mutation failed."
  result: AccessToken
}

"Create a scoped, time-limited access token for API authentication."
input CreateAccessTokenInput {
  "How many minutes until this token expires. Defaults to 60 (1 hour). Maximum ~5,256,000 (10 years)."
  expiresInMinutes: Int

  "A label to identify this token (e.g., 'CI deploy key')"
  name: String!

  "Permission scopes. At least one required. Currently only [\"*\"] (full access) is supported."
  scopes: [String!]!

  "Create the token on behalf of this service account. Omit to create for the authenticated identity."
  serviceAccountId: String
}

"The type of actor that performed an action."
enum AuditLogActorType {
  "Human user account"
  ACCOUNT

  "Service account (API key)"
  SERVICE_ACCOUNT

  "Automated deployment"
  DEPLOYMENT

  "System action or legacy event"
  SYSTEM
}

"Available fields for sorting audit logs."
enum AuditLogsSortField {
  "Sort by when the event occurred"
  OCCURRED_AT

  "Sort by event type"
  TYPE
}

"Sorting options for the audit logs list."
input AuditLogsSort {
  "Which field to sort by"
  field: AuditLogsSortField!

  "Sort direction"
  order: SortOrder!
}

"Filter by the type of actor that performed the action."
input AuditLogActorTypeFilter {
  "Exact match"
  eq: AuditLogActorType

  "Match any of these actor types"
  in: [AuditLogActorType!]
}

"Filter which audit logs to return."
input AuditLogsFilter {
  "Filter by when the event occurred"
  occurredAt: DatetimeFilter

  "Filter by event type (e.g., 'project.created')"
  type: StringFilter

  "Filter by who performed the action"
  actorType: AuditLogActorTypeFilter

  "Filter by the actor's ID"
  actorId: IdFilter
}

"The actor that performed an audit-logged action."
type V1AuditLogActor {
  "Actor's unique identifier"
  id: ID!

  "What kind of actor this is"
  type: AuditLogActorType!

  "Display name (email for users, name for service accounts)"
  name: String!
}

"An audit log event."
type AuditLog {
  "Unique event identifier"
  id: ID!

  "When the event occurred (UTC)"
  occurredAt: DateTime!

  "Event type (e.g., 'project.created')"
  type: String!

  "Where the event originated"
  source: String!

  "Resource the event applies to (MRI format)"
  subject: String

  "Event payload with context and resource details"
  data: Map

  "Who performed this action"
  actor: V1AuditLogActor!
}

type AuditLogsPage {
  "Pagination cursors"
  cursor: PaginationCursor!

  "A list of type audit_log."
  items: [AuditLog]
}

"The current status of an integration."
enum IntegrationStatus {
  "Integration is inactive"
  DISABLED

  "Integration is being deactivated"
  DISABLING

  "Integration is being activated"
  ENABLING

  "Integration is active and running"
  ENABLED
}

"Available fields for sorting integrations."
enum IntegrationsSortField {
  "Sort by when the integration was created"
  CREATED_AT

  "Sort alphabetically by integration type"
  ID
}

"Filter for integration status."
input IntegrationStatusFilter {
  "Exact match"
  eq: IntegrationStatus

  "Match any of these statuses"
  in: [IntegrationStatus!]
}

"Filter options for the integrations list."
input IntegrationsFilter {
  "Filter by integration type ID"
  id: StringFilter

  "Filter by status"
  status: IntegrationStatusFilter
}

"Sorting options for the integrations list."
input IntegrationsSort {
  "Which field to sort by"
  field: IntegrationsSortField!

  "Sort direction"
  order: SortOrder!
}

"Create and activate an integration for your organization. The config and auth payloads must conform to the integration type's configSchema and authSchema respectively."
input CreateIntegrationInput {
  "Authentication credentials. Must conform to the integration type's authSchema. Write-only — not returned in queries."
  auth: Map!

