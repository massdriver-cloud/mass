  "When this deployment was last updated (UTC)"
  updatedAt: DateTime!

  "When the status last changed (UTC)"
  lastTransitionedAt: DateTime

  "How long the deployment has been running, in seconds."
  elapsedTime: Int!

  "Who started this deployment."
