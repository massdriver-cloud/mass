# PROJECTS

query getProjects(
  $organizationId: ID!,
  # @genqlient(omitempty: true, pointer: true)
  $sort: ProjectsSort,
  # @genqlient(omitempty: true, pointer: true)
  $cursor: Cursor
) {
  projects(organizationId: $organizationId, sort: $sort, cursor: $cursor) {
    cursor {
      next
      previous
    }
    items {
      id
      name
      description
      createdAt
      updatedAt
      cost {
        monthlyAverage {
          amount
          currency
        }
        dailyAverage {
          amount
          currency
        }
      }
    }
  }
}

query getProjectById($organizationId: ID!, $id: ID!) {
  project(organizationId: $organizationId, id: $id) {
    id
    name
    description
    createdAt
    updatedAt
    deletable {
      result
      constraints {
        message
        type
        id
      }
    }
    cost {
      monthlyAverage {
        amount
        currency
      }
      dailyAverage {
        amount
        currency
      }
    }
    environments {
      cursor {
        next
        previous
      }
      items {
        id
        name
        description
        createdAt
        updatedAt
        project {
          id
          name
        }
      }
    }
    blueprint {
      components {
        items {
          id
          name
          description
          createdAt
          updatedAt
          repo {
            name
          }
          project {
            id
            name
          }
        }
      }
      links {
        items {
          id
          fromField
          toField
          createdAt
          updatedAt
          fromComponent {
            id
            name
          }
          toComponent {
            id
            name
          }
        }
      }
    }
  }
}

mutation createProject($organizationId: ID!, $input: CreateProjectInput!) {
  createProject(organizationId: $organizationId, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation updateProject($organizationId: ID!, $id: ID!, $input: UpdateProjectInput!) {
  updateProject(organizationId: $organizationId, id: $id, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation deleteProject($organizationId: ID!, $id: ID!) {
  deleteProject(organizationId: $organizationId, id: $id) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}


