# SERVER

query getServer {
  server {
    appUrl
    version
    mode
    ssoProviders {
      name
      loginUrl
      uiIconUrl
      uiLabel
    }
    emailAuthMethods {
      name
    }
  }
}


# PROJECTS

query listProjects($organizationId: ID!) {
  projects(organizationId: $organizationId, sort: {field: NAME, order: ASC}) {
    items {
      id
      name
      description
      tags
      createdAt
      updatedAt
      cost {
        monthlyAverage {
          amount
          currency
        }
        dailyAverage {
          amount
          currency
        }
      }
    }
  }
}

query getProject($organizationId: ID!, $id: ID!) {
  project(organizationId: $organizationId, id: $id) {
    id
    name
    description
    tags
    environments {
      items {
        id
        name
        description
        createdAt
        updatedAt
        cost {
          monthlyAverage {
            amount
            currency
          }
          dailyAverage {
            amount
            currency
          }
        }
      }
    }
    createdAt
    updatedAt
    deletable {
      result
    }
    cost {
      monthlyAverage {
        amount
        currency
      }
      dailyAverage {
        amount
        currency
      }
    }
  }
}

mutation createProject($organizationId: ID!, $input: CreateProjectInput!) {
  createProject(organizationId: $organizationId, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation updateProject($organizationId: ID!, $id: ID!, $input: UpdateProjectInput!) {
  updateProject(organizationId: $organizationId, id: $id, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation deleteProject($organizationId: ID!, $id: ID!) {
  deleteProject(organizationId: $organizationId, id: $id) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}


# COMPONENTS

# @genqlient(for: "LinksFilter.fromComponentId", omitempty: true, pointer: true)
# @genqlient(for: "LinksFilter.toComponentId", omitempty: true, pointer: true)
query listLinks(
  $organizationId: ID!,
  $projectId: ID!,
  # @genqlient(omitempty: true, pointer: true)
  $filter: LinksFilter,
  # @genqlient(omitempty: true, pointer: true)
  $cursor: Cursor
) {
  project(organizationId: $organizationId, id: $projectId) {
    blueprint {
      links(filter: $filter, cursor: $cursor) {
        cursor {
          next
          previous
        }
        items {
          id
          fromField
          toField
          createdAt
          updatedAt
          fromComponent {
            id
            name
            description
            tags
            createdAt
            updatedAt
          }
          toComponent {
            id
            name
            description
            tags
            createdAt
            updatedAt
          }
        }
      }
    }
  }
}

# @genqlient(for: "AddComponentInput.description", omitempty: true)
# @genqlient(for: "AddComponentInput.tags", omitempty: true)
mutation addComponent(
  $organizationId: ID!,
  $projectId: ID!,
  $ociRepoName: OciRepoName!,
  $input: AddComponentInput!
) {
  addComponent(
    organizationId: $organizationId,
    projectId: $projectId,
    ociRepoName: $ociRepoName,
    input: $input
  ) {
    result {
      id
      name
      description
      tags
      createdAt
      updatedAt
      ociRepo {
        id
        name
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation removeComponent($organizationId: ID!, $id: ID!) {
  removeComponent(organizationId: $organizationId, id: $id) {
    result {
      id
      name
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation linkComponents($organizationId: ID!, $input: LinkComponentsInput!) {
  linkComponents(organizationId: $organizationId, input: $input) {
    result {
      id
      fromField
      toField
      createdAt
      updatedAt
      fromComponent {
        id
        name
        description
        tags
        createdAt
        updatedAt
      }
      toComponent {
        id
        name
        description
        tags
        createdAt
        updatedAt
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation unlinkComponents($organizationId: ID!, $id: ID!) {
  unlinkComponents(organizationId: $organizationId, id: $id) {
    result {
      id
      fromField
      toField
    }
    successful
    messages {
      code
      field
      message
    }
  }
}


