# PROJECTS

query listProjects($organizationId: ID!) {
  projects(organizationId: $organizationId, sort: {field: NAME, order: ASC}) {
    items {
      id
      name
      description
      createdAt
      updatedAt
      cost {
        monthlyAverage {
          amount
          currency
        }
        dailyAverage {
          amount
          currency
        }
      }
    }
  }
}

query getProject($organizationId: ID!, $id: ID!) {
  project(organizationId: $organizationId, id: $id) {
    id
    name
    description
    environments {
      items {
        id
        name
        description
        createdAt
        updatedAt
        cost {
          monthlyAverage {
            amount
            currency
          }
          dailyAverage {
            amount
            currency
          }
        }
      }
    }
    createdAt
    updatedAt
    deletable {
      result
    }
    cost {
      monthlyAverage {
        amount
        currency
      }
      dailyAverage {
        amount
        currency
      }
    }
  }
}

mutation createProject($organizationId: ID!, $input: CreateProjectInput!) {
  createProject(organizationId: $organizationId, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation updateProject($organizationId: ID!, $id: ID!, $input: UpdateProjectInput!) {
  updateProject(organizationId: $organizationId, id: $id, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation deleteProject($organizationId: ID!, $id: ID!) {
  deleteProject(organizationId: $organizationId, id: $id) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}


# ENVIRONMENTS

query listEnvironments(
  $organizationId: ID!,
  # @genqlient(omitempty: true, pointer: true)
  $filter: EnvironmentsFilter,
  # @genqlient(omitempty: true, pointer: true)
  $sort: EnvironmentsSort,
  # @genqlient(omitempty: true, pointer: true)
  $cursor: Cursor
) {
  environments(organizationId: $organizationId, filter: $filter, sort: $sort, cursor: $cursor) {
    cursor {
      next
      previous
    }
    items {
      id
      name
      description
      createdAt
      updatedAt
      project {
        id
        name
      }
      cost {
        monthlyAverage {
          amount
          currency
        }
        dailyAverage {
          amount
          currency
        }
      }
    }
  }
}

query getEnvironment($organizationId: ID!, $id: ID!) {
  environment(organizationId: $organizationId, id: $id) {
    id
    name
    description
    createdAt
    updatedAt
    cost {
      monthlyAverage {
        amount
        currency
      }
      dailyAverage {
        amount
        currency
      }
    }
    project {
      id
      name
      description
    }
    blueprint {
      instances {
        cursor {
          next
          previous
        }
        items {
          id
          name
          status
          version
          releaseStrategy
          createdAt
          updatedAt
          bundle {
            name
            id
          }
        }
      }
    }
  }
}

mutation createEnvironment($organizationId: ID!, $projectId: ID!, $input: CreateEnvironmentInput!) {
  createEnvironment(organizationId: $organizationId, projectId: $projectId, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation updateEnvironment($organizationId: ID!, $id: ID!, $input: UpdateEnvironmentInput!) {
  updateEnvironment(organizationId: $organizationId, id: $id, input: $input) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation deleteEnvironment($organizationId: ID!, $id: ID!) {
  deleteEnvironment(organizationId: $organizationId, id: $id) {
    result {
      id
      name
      description
    }
    successful
    messages {
      code
      field
      message
    }
  }
}
