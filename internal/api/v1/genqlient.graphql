    successful
    messages {
      code
      field
      message
    }
  }
}

mutation unlinkComponents($organizationId: ID!, $id: ID!) {
  unlinkComponents(organizationId: $organizationId, id: $id) {
    result {
      id
    }
    successful
    messages {
      code
      field
      message
    }
  }
}


# VIEWER

query getViewer {
  viewer {
    ... on AccountViewer {
      id
      email
      firstName
      lastName
      createdAt
      updatedAt
      defaultOrganization {
        id
        name
      }
    }
    ... on ServiceAccountViewer {
      id
      name
      description
      createdAt
      updatedAt
      organization {
        id
        name
      }
    }
  }
}


# SERVER

query getServer {
  server {
    appUrl
    version
    mode
    ssoProviders {
      name
      loginUrl
      uiIconUrl
      uiLabel
    }
    emailAuthMethods {
      name
    }
  }
}
