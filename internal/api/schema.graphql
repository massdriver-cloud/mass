"""
The type of lifecycle change that triggered an event.

Every event carries an action indicating whether the resource was created,
modified, or removed.
"""
enum EventAction {
  "A new resource was created."
  CREATED

  "An existing resource was modified (configuration, status, or metadata changed)."
  UPDATED

  "A resource was permanently removed."
  DELETED

  "A new immutable artifact was published (e.g., a bundle version released to an OCI repository)."
  PUBLISHED
}

"""
Base interface implemented by all lifecycle events.

Every event carries an `action` describing what happened and a `timestamp` recording
when it occurred. Concrete event types add a field for the affected resource.

Because each subscription returns a union, use an `... on Event` fragment to
access the shared fields and concrete fragments for the resource payload:

```graphql
subscription {
  projectEvents(organizationId: "my-org", projectId: "my-project") {
    ... on Event { action timestamp }
    ... on ComponentEvent {
      component { id name }
    }
    ... on LinkEvent {
      link { id fromField toField }
    }
  }
}
```
"""
interface Event {
  "The type of change that occurred."
  action: EventAction!

  "When the event occurred, in UTC."
  timestamp: DateTime!
}

"""
A lifecycle event for a project.

Emitted when a project is created, updated (renamed, settings changed), or deleted.
Subscribe via `organizationEvents` or `projectEvents`.
"""
type ProjectEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The project that was created, updated, or deleted."
  project: Project!
}

"""
A lifecycle event for an environment.

Emitted when an environment is created, updated (renamed, settings changed), or deleted
within a project. Subscribe via `projectEvents` for any environment in the project, or
via `environmentEvents` for a specific environment (updates and deletes only — the
environment must exist to subscribe to it).
"""
type EnvironmentEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The environment that was created, updated, or deleted."
  environment: Environment!
}

"""
A lifecycle event for an instance.

Emitted when an instance is created, updated (configuration changed, deployment triggered),
or deleted. Subscribe via `instanceEvents` or `projectEvents`.
"""
type InstanceEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The instance that was created, updated, or deleted."
  instance: Instance!
}

"""
A lifecycle event for a component.

Emitted when a component is added to a blueprint, moved on the canvas, renamed or
re-tagged, or removed. Subscribe via `projectEvents`.
"""
type ComponentEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The component that was created, updated, or deleted."
  component: Component!
}

"""
A lifecycle event for a blueprint link between two components.

Emitted when components are linked or unlinked in a project's blueprint. Links have
no mutable body, so only `CREATED` and `DELETED` actions are emitted. Subscribe via
`projectEvents`.
"""
type LinkEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The link that was created or deleted."
  link: Link!
}

"""
A lifecycle event for a realized connection between two instances in an environment.

A connection is the runtime materialization of a blueprint link — it wires one
instance's output artifact into another instance's input field within a single
environment. Emitted when a connection is established or torn down. Subscribe via
`environmentEvents` for every connection in an environment, or via `instanceEvents`
for connections that terminate on a specific instance.
"""
type ConnectionEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The connection that was created or deleted."
  connection: Connection!
}

"""
A lifecycle event for a cloud metric alarm attached to an instance.

Emitted when an alarm is registered, reconfigured, removed, or when its
firing state changes (e.g., `OK` → `ALARM`). State transitions surface as
`UPDATED` — read the latest status from `alarm.currentState`. Subscribe via
`environmentEvents` or `instanceEvents`.
"""
type AlarmEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The alarm that was created, updated, or deleted."
  alarm: Alarm!
}

"""
A lifecycle event for an OCI repository in the organization's bundle catalog.

Emitted with action `CREATED` the first time a bundle is published under a
new repository name. The registry is immutable — repositories cannot be
renamed or deleted through the API today — so subsequent publishes to an
existing repository fire a `BundleEvent` instead. Subscribe via
`organizationEvents`.
"""
type OciRepoEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The OCI repository that was created."
  ociRepo: OciRepo!
}

"""
A lifecycle event for a deployment.

Emitted when a deployment is created (`CREATED`) and each time its status
transitions (`UPDATED`) — e.g., `PENDING` → `RUNNING` → `COMPLETED`. Log
deltas are **not** carried on this event; subscribe to `deploymentLogs` for
streaming log content.

Subscribe via `deploymentEvents` for a single deployment's feed, or via
`instanceEvents` / `environmentEvents` to see every deployment in an
instance or environment.

On `UPDATED`, re-select whichever fields you need (typically `status` and
`elapsedTime`) — Apollo will merge the payload into its cache by `Deployment:id`.
"""
type DeploymentEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The deployment that was created or updated."
  deployment: Deployment!
}

"""
A lifecycle event for a published bundle version.

Emitted with action `PUBLISHED` each time a new bundle release is pushed to
an OCI repository in the organization. Bundle versions are immutable, so
neither `UPDATED` nor `DELETED` is emitted today. Subscribe via
`organizationEvents`.
"""
type BundleEvent implements Event {
  action: EventAction!

  timestamp: DateTime!

  "The bundle version that was published."
  bundle: Bundle!
}

"Events delivered by the `organizationEvents` subscription."
union OrganizationEventsPayload = ProjectEvent | OciRepoEvent | BundleEvent

"""
Events delivered by the `projectEvents` subscription.

Covers the project itself plus its blueprint (components, links) and the
environments provisioned from it.
"""
union ProjectEventsPayload = ProjectEvent | EnvironmentEvent | ComponentEvent | LinkEvent

"""
Events delivered by the `environmentEvents` subscription.

Covers the environment itself, every instance provisioned into it, every
connection wired within it, every alarm attached to those instances, and
every deployment run against them.
"""
union EnvironmentEventsPayload = EnvironmentEvent | InstanceEvent | ConnectionEvent | AlarmEvent | DeploymentEvent

"""
Events delivered by the `instanceEvents` subscription.

Covers the instance itself, incoming connections that terminate on it,
alarms attached to it, and deployments run against it.
"""
union InstanceEventsPayload = InstanceEvent | ConnectionEvent | AlarmEvent | DeploymentEvent

"""
Events delivered by the `deploymentEvents` subscription.

A single-deployment feed. Fires on creation and every status transition.
For log content, subscribe to `deploymentLogs` — log deltas don't travel on
this feed.
"""
union DeploymentEventsPayload = DeploymentEvent

"""
How a resource was created, which determines how it can be managed.

- **IMPORTED** resources are created and managed directly through the API.
