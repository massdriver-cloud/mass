schema {
  mutation: RootMutationType
  subscription: RootSubscriptionType
  query: RootQueryType
}

"Links a mutation to its JSON Schema and UI Schema for form generation"
directive @inputs(
  "URL to the UI Schema"
  ui: String!

  "URL to the JSON Schema"
  schema: String!

  "Schema name matching the mutation (e.g., createProject)"
  name: String!
) on FIELD_DEFINITION

type RootQueryType {
  """
  List all projects you have access to in the organization.

  Returns a cursor-paginated list. Use `sort` to control ordering (defaults to name ascending).

  ```graphql
  query {
    projects(organizationId: "my-org") {
      items { id name description tags }
      cursor { next }
    }
  }
  ```
  """
  projects(
    "Your organization's unique identifier."
    organizationId: ID!

    "How to sort results. Defaults to name ascending."
    sort: ProjectsSort

    "Cursor from a previous page to fetch the next set of results."
    cursor: Cursor
  ): ProjectsPage

  "Fetch a single project by its identifier."
  project(
    "Your organization's unique identifier."
    organizationId: ID!

    "The project's unique identifier."
    id: ID!
  ): Project

  """
  List all environments you have access to across all projects.

  Returns a cursor-paginated list. Use `filter` to narrow by project or environment ID,
  and `sort` to control ordering (defaults to name ascending).

  ```graphql
  query {
    environments(organizationId: "my-org", filter: { projectId: { eq: "my-project" } }) {
      items { id name project { id } }
      cursor { next }
    }
  }
  ```
  """
  environments(
    "Your organization's unique identifier."
    organizationId: ID!

    "Optional filters to narrow results."
    filter: EnvironmentsFilter

    "How to sort results. Defaults to name ascending."
    sort: EnvironmentsSort

    "Cursor from a previous page to fetch the next set of results."
    cursor: Cursor
  ): EnvironmentsPage

  "Fetch a single environment by its identifier."
  environment(
    "Your organization's unique identifier."
    organizationId: ID!

    "The environment's unique identifier."
    id: ID!
  ): Environment

  """
  Compare two environments in the same project, instance-by-instance.

  Instances are paired by component. For each component, the result reports
  the resolved version on each side and a flat, leaf-level diff of the
  configured params. Environment-level tags and default wiring are not part
  of the comparison.

  Both environments must belong to the same project; passing environments
  from different projects returns a `FORBIDDEN` error because components
  don't cross project boundaries.

  ```graphql
  query {
    compareEnvironments(organizationId: "my-org", sourceId: "staging", targetId: "prod") {
      source { id } target { id }
      instances {
        component { id name }
        source { id } target { id }
        version { source target equal }
        params { path equal source { value } target { value } }
        equal
      }
    }
  }
  ```
  """
  compareEnvironments(
    "Your organization's unique identifier."
    organizationId: ID!

    "The source environment's identifier."
    sourceId: ID!

    "The target environment's identifier."
    targetId: ID!
  ): EnvironmentComparison

  """
  List all instances you have access to.

  Returns a paginated list of deployed infrastructure across all projects
  and environments visible to the current user. Use filters to narrow by
  project, environment, status, bundle, or configuration parameters.

  ```graphql
  query {
    instances(
      organizationId: "my-org"
      filter: { status: { eq: PROVISIONED } }
      sort: { field: name, order: ASC }
    ) {
      items {
        id
        name
        status
        resolvedVersion
        environment { id }
      }
      cursor { after }
    }
  }
  ```
  """
  instances(
    "Your organization's unique identifier."
    organizationId: ID!

    "Narrow results by project, environment, status, bundle, or params."
    filter: InstancesFilter

    "Sort field and direction. Defaults to `name` ascending."
    sort: InstancesSort

    "Pagination cursor returned by a previous page."
    cursor: Cursor
  ): InstancesPage

  "Fetch a single instance by its ID. Returns null with a `NOT_FOUND` error if the instance does not exist."
  instance(
    "Your organization's unique identifier."
    organizationId: ID!

    "The instance ID to look up."
    id: ID!
  ): Instance

  """
  Discover the configuration fields available across your instances.

  Introspects the bundle schemas of all accessible instances and returns the
  unique, filterable parameter fields. Use the results to build dynamic search
  filters or infrastructure dashboards.

  For example, if your database instances expose `database.instance_type` and
  your Kubernetes instances expose `cluster.node_count`, both will appear here.
  You can then pass those fields to the `paramDimension` filter on the
  `instances` query.

  ```graphql
  query {
    paramDimensions(organizationId: "my-org") {
      items { field label type }
      cursor { after }
    }
  }
  ```
  """
  paramDimensions(
    "Your organization's unique identifier."
    organizationId: ID!

    "Scope which instances' schemas to introspect."
    filter: ParamDimensionsFilter

    "Sort field and direction. Defaults to `field` ascending."
    sort: ParamDimensionsSort

    "Pagination cursor returned by a previous page."
    cursor: Cursor
  ): ParamDimensionsPage

  """
  List deployments across all projects and environments you have access to.

  Returns a cursor-paginated list, sorted by newest first by default. Use `filter`
  to narrow results by instance, status, or action type.

  ```graphql
  query {
    deployments(organizationId: "my-org", filter: { status: { eq: RUNNING } }) {
      items {
        id
        status
        action
        version
        elapsedTime
        deployedBy
        instance { id }
      }
      cursor { next }
    }
  }
  ```
  """
  deployments(
    "Your organization's unique identifier."
    organizationId: ID!

    "Optional filters to narrow the results."
    filter: DeploymentsFilter

    "Sort order for results. Defaults to newest first."
    sort: DeploymentsSort

    "Cursor from a previous page to fetch the next set of results."
    cursor: Cursor
  ): DeploymentsPage

  """
  Fetch a single deployment by its unique identifier.

  Returns the full deployment record including status, timing, and the associated instance.
  """
  deployment(
    "Your organization's unique identifier."
    organizationId: ID!

    "The deployment's unique identifier."
    id: ID!
  ): Deployment

  """
  Compare two deployments side-by-side.

  Returns the bundle version on each side and a flat, leaf-level diff of
  the snapshotted params. Useful for auditing what a deploy changed, or
  for contrasting deploys from different points in time.

  Both deployments must belong to the requesting organization. There is no
  requirement that they target the same instance — callers can pass any
  two deployments they have access to, though comparisons across unrelated
  instances will naturally show every leaf as "only on one side".

  ```graphql
  query {
    compareDeployments(organizationId: "my-org", sourceId: "<uuid-a>", targetId: "<uuid-b>") {
      source { id status version }
      target { id status version }
      version { source target equal }
      params { path source { value } target { value } equal }
    }
  }
  ```
  """
  compareDeployments(
    "Your organization's unique identifier."
    organizationId: ID!

    "The source deployment's unique identifier."
    sourceId: ID!

    "The target deployment's unique identifier."
    targetId: ID!
  ): DeploymentComparison

  """
  List published bundle versions in your organization's catalog.

  Returns a paginated list of all bundle releases across all OCI repositories.
  Each item is a specific version (e.g., `aws-aurora-postgres@1.2.3`), not just
  the repository.

  Use `filter` to narrow results by repository name, resource type produced,
  dependency type consumed, or full-text search. When `search` is active, results
  are ranked by relevance unless an explicit `sort` is provided.

  ```graphql
  query {
    bundles(organizationId: "your-org-id", filter: { resourceType: { eq: "aws-iam-role" } }) {
      items {
        id
        name
        version
        description
        dependencies { name resourceType { id } }
        resources { name resourceType { id } }
      }
      cursor { next }
    }
  }
  ```
  """
  bundles(
    "Your organization's unique identifier."
    organizationId: ID!

    "Narrow results by repository, type, or search term."
    filter: BundlesFilter

    "Explicit sort order. Defaults to `name` ascending. When a `search` filter is active and no sort is provided, results are ranked by relevance."
    sort: BundlesSort

    "Cursor from a previous page's `cursor.next` or `cursor.previous`."
    cursor: Cursor
  ): BundlesPage

  """
  Fetch a single bundle by its composite identifier.

  The `id` accepts a `name@version` string where the version portion can be an
  exact semver, a release channel, or omitted entirely:

  | Input | Resolves to |
  |-------|-------------|
  | `aws-aurora-postgres@1.2.3` | Exact version `1.2.3` |
  | `aws-aurora-postgres@~1.2` | Latest patch in `1.2.x` |
  | `aws-aurora-postgres@~1` | Latest minor in `1.x.x` |
  | `aws-aurora-postgres@latest` | Newest stable release |
  | `aws-aurora-postgres@latest+dev` | Newest release including dev builds |
  | `aws-aurora-postgres` | Shorthand for `latest` (falls back to `latest+dev` if no stable exists) |

  Returns `null` with a `NOT_FOUND` error if no matching version exists.

  ```graphql
  query {
    bundle(organizationId: "your-org-id", id: "aws-aurora-postgres@~1") {
      id
      version
      dependencies { name required resourceType { id name } }
      resources { name required resourceType { id name } }
    }
  }
  ```
  """
  bundle(
    "Your organization's unique identifier."
    organizationId: ID!

    "Bundle identifier in `name@version` format. The version can be an exact semver, a release channel, or omitted to resolve `latest`."
    id: BundleId!
  ): Bundle

  """
  Fetch a single OCI repository by name.

  Returns the repository along with its nested `tags` and `releaseChannels`
  collections. Returns `null` with a `NOT_FOUND` error if the repository
  does not exist in your organization.

  ```graphql
  query {
    ociRepo(organizationId: "your-org-id", id: "aws-aurora-postgres") {
      id
      name
      artifactType
      tags(sort: { field: VERSION, order: DESC }) {
        items { tag createdAt }
        cursor { next }
      }
      releaseChannels(filter: { stable: true }) {
        items { name tag }
      }
    }
  }
  ```
  """
  ociRepo(
    "Your organization's unique identifier."
    organizationId: ID!

    "The repository name (e.g., `aws-aurora-postgres`)."
    id: ID!
  ): OciRepo

  """
  List OCI repositories in your organization's bundle catalog.

  Returns a paginated list of repositories. Each repository is the container
  for all published versions of a bundle. Use `filter` to narrow by name,
  artifact type, or full-text search.

  ```graphql
  query {
    ociRepos(organizationId: "your-org-id", filter: { name: { startsWith: "aws-" } }) {
      items {
        id
        name
        tags(sort: { field: VERSION, order: DESC }) {
          items { tag }
        }
      }
      cursor { next }
    }
  }
  ```
  """
  ociRepos(
    "Your organization's unique identifier."
    organizationId: ID!

    "Narrow results by name, artifact type, or search term."
    filter: OciReposFilter

    "Explicit sort order. Defaults to `name` ascending. When a `search` filter is active and no sort is provided, results are ranked by relevance."
    sort: OciReposSort

    "Cursor from a previous page's `cursor.next` or `cursor.previous`."
    cursor: Cursor
  ): OciReposPage

  """
  List all groups in your organization.

  Returns a paginated, sortable list of groups. By default, groups are sorted
  alphabetically by name.

  **Example:**

  ```graphql
  query {
    groups(organizationId: "my-org") {
      data {
        id
        name
        role
        description
      }
      cursor { next }
    }
  }
  ```
  """
  groups(
    "Your organization's unique identifier."
    organizationId: ID!

    "Sort field and direction. Defaults to name ascending."
    sort: GroupsSort

    "Pagination cursor returned from a previous response to fetch the next page."
    cursor: Cursor
  ): GroupsPage

  """
  Retrieve a single group by its identifier.

  Returns `null` with a `NOT_FOUND` error if the group does not exist or you do not have
  permission to view it.
  """
  group(
    "Your organization's unique identifier."
    organizationId: ID!

    "The group's unique identifier."
    id: ID!
  ): Group

  """
  Fetch your organization's details, including tag constraints and logo.

  ```graphql
  query {
    organization(organizationId: "my-org") {
      id
      name
      tagConstraints { items { key scope required } }
    }
  }
  ```
  """
  organization(
    "Your organization's unique identifier."
    organizationId: ID!
  ): Organization

  """
  Get information about the currently authenticated entity.

  Returns an `AccountViewer` for human users or a `ServiceAccountViewer` for API clients.
  This is the "who am I?" query — use it to bootstrap user profiles, display org switchers,
  check billing status, or verify which service account is making requests.

  Returns an authentication error if the request has no valid credentials.
  """
  viewer: Viewer

  """
  Get server metadata and available authentication methods.

  This query does **not** require authentication and is intended to be the first
  call a client makes. Use the response to determine which login methods to present
  and to verify API compatibility via the server version.

  ```graphql
  query {
    server {
      version
      mode
      appUrl
      ssoProviders {
        name
        loginUrl
        uiLabel
        uiIconUrl
      }
      emailAuthMethods {
        name
      }
    }
  }
  ```
  """
  server: Server!

  """
  List all supported integration types in the Massdriver catalog.

  Returns the full catalog of integrations that can be configured, along with their
  JSON schemas for `config` and `auth` fields. Use this to discover available integrations
  and build configuration forms.

  ```graphql
  query {
    integrationTypes(organizationId: "my-org") {
      items {
        id
        name
        description
        configSchema
        authSchema
      }
    }
  }
  ```
  """
  integrationTypes(
    "Your organization's unique identifier."
    organizationId: ID!
  ): IntegrationTypesPage

  """
  List your organization's configured integrations.

  Returns all integrations that have been created for your organization, with support
  for filtering by type and status, sorting, and cursor-based pagination.

  ```graphql
  query {
    integrations(organizationId: "my-org", filter: { status: { eq: enabled } }) {
      cursor { next }
      items {
        id
        status
        nextRunAt
      }
    }
  }
  ```
  """
  integrations(
    "Your organization's unique identifier."
    organizationId: ID!

    "Filter criteria. All filters are combined with AND."
    filter: IntegrationsFilter

    "Sort order. Defaults to `createdAt` ascending."
    sort: IntegrationsSort

    "Pagination cursor from a previous response."
    cursor: Cursor
  ): IntegrationsPage

  """
  Get a single integration by its type identifier.

  Returns the integration configuration for a specific type within your organization,
  or a `NOT_FOUND` error if no integration of that type has been configured.
  """
  integration(
    "Your organization's unique identifier."
    organizationId: ID!

    "The integration type identifier (e.g., `\"aws-cost-and-usage-reports\"`)."
    id: ID!
  ): Integration

  """
  List audit log events for your organization.

  Returns a paginated, filterable, sortable list of audit log events. By default, events are
  sorted newest first (`occurredAt` descending).

  **Filtering** — Use the `filter` argument to narrow results by time range, event type,
  actor type, or specific actor. All filters are combined with AND logic.

  **Example:**

  ```graphql
  query {
    auditLogs(
      organizationId: "my-org"
      filter: {
        occurredAt: { gte: "2025-01-01T00:00:00Z" }
        type: { eq: "project.created" }
        actorType: { in: [ACCOUNT, SERVICE_ACCOUNT] }
        actor: { search: "alice" }
      }
    ) {
      items {
        id
        occurredAt
        type
        subject
        actor { type name }
      }
      cursor { next }
    }
  }
  ```
  """
  auditLogs(
    "Your organization's unique identifier."
    organizationId: ID!

    "Optional filter criteria to narrow results."
    filter: AuditLogsFilter

    "Sort field and direction. Defaults to newest first."
    sort: AuditLogsSort

    "Pagination cursor from a previous response to fetch the next page."
    cursor: Cursor
  ): AuditLogsPage

  """
  Retrieve a single audit log event by its identifier.

  Returns `null` with a `NOT_FOUND` error if the event does not exist or belongs to a
  different organization.
  """
  auditLog(
    "Your organization's unique identifier."
    organizationId: ID!

    "The audit log event's unique identifier."
    id: ID!
  ): AuditLog

  """
  Return the complete catalog of audit log event types emitted by Massdriver.

  Event types are dot-notated strings (e.g., `project.created`, `deployment.completed`)
  that categorize audit log events. This query returns the full static list — not just
  the types that currently have events in your organization — so it's ideal for
  populating a filter dropdown or building a dashboard that groups events by category.

  The list is sorted alphabetically and does not require pagination.
  """
  auditLogEventTypes(
    "Your organization's unique identifier."
    organizationId: ID!
  ): [String!]!

  """
  List resource types available to your organization.

  Returns both public resource types provided by Massdriver and any private
  resource types defined by your organization. Use this to discover what
  dependency and resource types are available when building bundles.

  ```graphql
  query {
    resourceTypes(organizationId: "your-org-id", filter: { id: { startsWith: "aws-" } }) {
      items {
        id
        name
        connectionOrientation
        icon
      }
      cursor { next }
    }
  }
  ```
  """
  resourceTypes(
    "Your organization's unique identifier."
    organizationId: ID!

    "Narrow results by resource type identifier or search term."
    filter: ResourceTypesFilter

    "Sort order. Defaults to `name` ascending. When a `search` filter is active and no sort is provided, results are ranked by relevance."
    sort: ResourceTypesSort

    "Cursor from a previous page's `cursor.next` or `cursor.previous`."
    cursor: Cursor
  ): ResourceTypesPage

  """
  Fetch a single resource type by its identifier.

  Returns `null` with a `NOT_FOUND` error if the resource type does not exist
  or is not accessible to your organization.

  ```graphql
  query {
    resourceType(organizationId: "your-org-id", id: "aws-iam-role") {
      id
      name
      connectionOrientation
      icon
    }
  }
  ```
  """
  resourceType(
    "Your organization's unique identifier."
    organizationId: ID!

    "The resource type identifier (e.g., `aws-iam-role`)."
    id: ID!
  ): ResourceType

  """
  List all resources in your organization.

  Returns a cursor-paginated list of both imported and provisioned resources.
  Use the `filter` argument to view only imported or only provisioned resources.

  ```graphql
  query {
    resources(organizationId: "my-org", filter: { origin: { eq: imported } }) {
      items {
        id
        name
        origin
        resourceType { id }
      }
      cursor { next }
    }
  }
  ```
  """
  resources(
    "Your organization's unique identifier."
    organizationId: ID!

    "Optional filters to narrow the results."
    filter: ResourcesFilter

    "Sort order for results. Defaults to alphabetical by name. When a `search` filter is active and no sort is provided, results are ranked by relevance."
    sort: ResourcesSort

    "Cursor from a previous page to fetch the next set of results."
    cursor: Cursor
  ): ResourcesPage

  """
  Fetch a single resource by its unique identifier.

  Returns the full resource record including its origin, resource type, and timestamps.
  """
  resource(
    "Your organization's unique identifier."
    organizationId: ID!

    "The resource's unique identifier."
    id: ID!
  ): Resource

  """
  List access tokens you own in an organization.

  Returns only tokens owned by the authenticated caller. Accounts see their own personal
  tokens; service accounts see tokens issued to themselves. There is no admin view of
  another user's personal tokens.

  **Example:**

  ```graphql
  query {
    accessTokens(
      organizationId: "my-org"
      filter: { revoked: false }
      sort: { field: EXPIRES_AT, order: ASC }
    ) {
      items { id name prefix expiresAt }
      cursor { next }
    }
  }
  ```
  """
  accessTokens(
    "Your organization's unique identifier."
    organizationId: ID!

    "Optional filters to narrow results."
    filter: AccessTokensFilter

    "Sort field and direction. Defaults to newest first."
    sort: AccessTokensSort

    "Cursor from a previous page to fetch the next set of results."
    cursor: Cursor
  ): AccessTokensPage
}

type RootSubscriptionType {
  """
  Subscribe to organization-level events via WebSocket.

  Receives events for projects created in the organization, OCI repositories
  created in the bundle catalog, and bundle versions published to those
  repositories. Requires organization membership.

  ```graphql
  subscription {
    organizationEvents(organizationId: "my-org") {
      ... on Event { action timestamp }
      ... on ProjectEvent {
        project { id name }
      }
      ... on OciRepoEvent {
        ociRepo { id name }
      }
      ... on BundleEvent {
        bundle { id name version }
      }
    }
  }
  ```
  """
  organizationEvents(
    "Your organization's unique identifier."
    organizationId: ID!
  ): OrganizationEventsPayload

  """
  Subscribe to events within a specific project via WebSocket.

  Receives events for the project itself, its environments, and its blueprint
  (components and links). Requires read access to the project.

  ```graphql
  subscription {
    projectEvents(organizationId: "my-org", projectId: "my-project") {
      ... on Event { action timestamp }
      ... on ProjectEvent {
        project { id name }
      }
      ... on EnvironmentEvent {
        environment { id name }
      }
      ... on ComponentEvent {
        component { id name }
      }
      ... on LinkEvent {
        link { id fromField toField }
      }
    }
  }
  ```
  """
  projectEvents(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the project to subscribe to."
    projectId: ID!
  ): ProjectEventsPayload

  """
  Subscribe to events within a specific environment via WebSocket.

  Receives updates and deletions for the environment itself, plus creation,
  update, and deletion events for every instance, connection, and alarm in
  that environment (including alarm firing-state transitions). Environment
  creation events are delivered via `projectEvents` (the environment must
  exist before you can subscribe to it).

  ```graphql
  subscription {
    environmentEvents(organizationId: "my-org", environmentId: "my-project-prod") {
      ... on Event { action timestamp }
      ... on EnvironmentEvent {
        environment { id name }
      }
      ... on InstanceEvent {
        instance { id name status }
      }
      ... on ConnectionEvent {
        connection { id fromField toField }
      }
      ... on AlarmEvent {
        alarm { id displayName currentState { status message } }
      }
    }
  }
  ```
  """
  environmentEvents(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the environment to subscribe to."
    environmentId: ID!
  ): EnvironmentEventsPayload

  """
  Subscribe to events for a specific instance via WebSocket.

  Receives events when the instance's configuration changes, a deployment is created,
  an incoming connection is added or removed, or a cloud metric alarm on the instance
  is registered, updated, deleted, or changes firing state. Requires read access to
  the instance's project.

  ```graphql
  subscription {
    instanceEvents(organizationId: "my-org", instanceId: "my-database") {
      ... on Event { action timestamp }
      ... on InstanceEvent {
        instance { id name status }
      }
      ... on ConnectionEvent {
        connection { id fromField toField }
      }
      ... on AlarmEvent {
        alarm { id displayName currentState { status message } }
      }
    }
  }
  ```
  """
  instanceEvents(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the instance to subscribe to."
    instanceId: ID!
  ): InstanceEventsPayload

  """
  Subscribe to lifecycle events for a single deployment via WebSocket.

  Receives a `DeploymentEvent` when the deployment is created or transitions
  status (e.g., `PENDING` → `RUNNING` → `COMPLETED`). For log deltas use
  `deploymentLogs` instead — this subscription does not fire on log appends.

  Re-select whatever fields you need on `deployment` — Apollo will merge the
  payload into its cache by `Deployment:id`.

  ```graphql
  subscription {
    deploymentEvents(organizationId: "my-org", deploymentId: "a1b2c3...") {
      ... on Event { action timestamp }
      ... on DeploymentEvent {
        deployment {
          id
          status
          elapsedTime
        }
      }
    }
  }
  ```
  """
  deploymentEvents(
    "Your organization's unique identifier."
    organizationId: ID!

    "The deployment's unique identifier."
    deploymentId: ID!
  ): DeploymentEventsPayload

  """
  Subscribe to a single deployment's logs as they're appended via WebSocket.

  Receives one `DeploymentLog` per worker flush — each flush is a batch of
  lines written as a single object in storage. Unlike `deploymentEvents`,
  this subscription does **not** re-send the entire deployment on every
  message; it streams only the new log batch. Cheap to keep open even for
  deployments producing logs at high cadence.

  For the initial backfill, query `deployment { logs { ... } }` once and
  render the result, then open this subscription to stream new batches.

  ```graphql
  subscription {
    deploymentLogs(organizationId: "my-org", deploymentId: "a1b2c3...") {
      timestamp
      message
    }
  }
  ```
  """
  deploymentLogs(
    "Your organization's unique identifier."
    organizationId: ID!

    "The deployment's unique identifier."
    deploymentId: ID!
  ): DeploymentLog!
}

type RootMutationType {
  """
  Create a new project in your organization.

  The `id` in the input becomes the project's permanent identifier and cannot be
  changed after creation. An empty blueprint is created automatically.
  """
  createProject(
    "Your organization's unique identifier."
    organizationId: ID!

    "Create a new project. A project is the complete model of your application—its infrastructure, architecture, configurations, and environments."
    input: CreateProjectInput!
  ): ProjectPayload @inputs(name: "createProject", schema: "\/graphql\/v1\/inputs\/createProject.json", ui: "\/graphql\/v1\/inputs\/createProject.ui.json")

  "Update a project's mutable fields (name, description, tags)."
  updateProject(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the project to update."
    id: ID!

    "Update an existing project's name and description. The ID cannot be changed after creation."
    input: UpdateProjectInput!
  ): ProjectPayload @inputs(name: "updateProject", schema: "\/graphql\/v1\/inputs\/updateProject.json", ui: "\/graphql\/v1\/inputs\/updateProject.ui.json")

  """
  Create a new project by cloning another project's blueprint.

  All components and links from the source project are copied into the new project.
  The new project gets its own independent blueprint -- subsequent changes do not
  affect the source. Environments are **not** cloned; you must create them separately.
  """
  cloneProject(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the project whose blueprint you want to clone."
    sourceProjectId: ID!

    "Attributes for the new project."
    input: CloneProjectInput!
  ): ProjectPayload @inputs(name: "cloneProject", schema: "\/graphql\/v1\/inputs\/cloneProject.json", ui: "\/graphql\/v1\/inputs\/cloneProject.ui.json")

  """
  Delete a project permanently.

  All environments must be deleted first. Query the project's `deletable` field
  to check for blocking constraints before calling this mutation.
  """
  deleteProject(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the project to delete."
    id: ID!
  ): ProjectPayload

  """
  Create a new environment in a project.

  The `id` in the input becomes the environment's permanent identifier and cannot be
  changed after creation. The new environment starts empty with no deployed instances.
  """
  createEnvironment(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the project to create the environment in."
    projectId: ID!

    "Create a new environment. Environments are isolated deployment contexts like production, staging, or development, each with independent secrets and configurations."
    input: CreateEnvironmentInput!
  ): EnvironmentPayload @inputs(name: "createEnvironment", schema: "\/graphql\/v1\/inputs\/createEnvironment.json", ui: "\/graphql\/v1\/inputs\/createEnvironment.ui.json")

  "Update an environment's mutable fields (name, description, tags)."
  updateEnvironment(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the environment to update."
    id: ID!

    "Update an existing environment's name and description. The ID cannot be changed after creation."
    input: UpdateEnvironmentInput!
  ): EnvironmentPayload @inputs(name: "updateEnvironment", schema: "\/graphql\/v1\/inputs\/updateEnvironment.json", ui: "\/graphql\/v1\/inputs\/updateEnvironment.ui.json")

  """
  Create a new environment by forking an existing one.

  The new environment is linked to the parent via its `parent` field. Instances
  are initialized from the project's components and seeded with the parent's
  instance `params`. Secrets and remote references are not copied — use
  `copyInstance` per instance to carry those over as well. Pass
  `copyEnvironmentDefaults: true` to also copy the parent's default resource
  connections.
  """
  forkEnvironment(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the environment to fork from."
    parentId: ID!

    "Attributes for the new environment. The fork references the parent via `parentId`, starts with blank instances, and does not copy any instance-level configuration. Use `copyInstance` per-instance if you want to seed configuration from the parent."
    input: ForkEnvironmentInput!
  ): EnvironmentPayload @inputs(name: "forkEnvironment", schema: "\/graphql\/v1\/inputs\/forkEnvironment.json", ui: "\/graphql\/v1\/inputs\/forkEnvironment.ui.json")

  """
  Delete an environment permanently.

  All instances must be decommissioned first. Query the environment's `deletable`
  field to check for blocking constraints before calling this mutation.
  """
  deleteEnvironment(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the environment to delete."
    id: ID!
  ): EnvironmentPayload

  """
  Set a resource as the default of its type for an environment.

  All instances in the environment that require this resource type will automatically
  inherit it. Only one resource per type can be the default -- remove the existing
  default first with `removeEnvironmentDefault` to change it.
  """
  setEnvironmentDefault(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the environment to set the default on."
    environmentId: ID!

    "The identifier of the resource to set as the default for its type."
    resourceId: ID!
  ): EnvironmentDefaultPayload

  """
  Remove an environment default.

  Instances will no longer automatically inherit this resource. **Warning:** removing
  a default can cause future deployments to fail if instances depend on the resource
  type that was provided by this default.
  """
  removeEnvironmentDefault(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the environment default to remove."
    id: ID!
  ): EnvironmentDefaultPayload

  """
  Add a component to a project's blueprint.

  Creates a new slot in the blueprint for the specified bundle. The component
  does not deploy anything on its own -- it defines *what* can be deployed.
  Instances are created in each environment when you deploy.

  ```graphql
  mutation {
    addComponent(
      organizationId: "my-org"
      projectId: "my-project"
      ociRepoName: "aws-aurora-postgres"
      input: { id: "database", name: "Primary Database" }
    ) {
      result { id name }
      successful
    }
  }
  ```
  """
  addComponent(
    "Your organization's unique identifier."
    organizationId: ID!

    "The project to add the component to."
    projectId: ID!

    "The bundle's OCI repository name (e.g., `aws-aurora-postgres`)."
    ociRepoName: OciRepoName!

    "Add an infrastructure component to a project's blueprint. Each component is a specific instance of a bundle (like a Redis cache or PostgreSQL database) that composes with other components to form your application."
    input: AddComponentInput!
  ): ComponentPayload @inputs(name: "addComponent", schema: "\/graphql\/v1\/inputs\/addComponent.json", ui: "\/graphql\/v1\/inputs\/addComponent.ui.json")

  """
  Remove a component from a project's blueprint.

  Deletes the component and all of its links. Any instances deployed from
  this component must be decommissioned first.
  """
  removeComponent(
    "Your organization's unique identifier."
    organizationId: ID!

    "The component ID to remove (e.g., `myproj-database`)."
    id: ID!
  ): ComponentPayload

  """
  Create a link between two components.

  Declares that the `fromField` output of one component should be wired to the
  `toField` input of another. Massdriver validates that the resource types are
  compatible before creating the link. When environments are deployed, each link
  becomes a **connection** that carries the actual resource data between instances.

  ```graphql
  mutation {
    linkComponents(
      organizationId: "my-org"
      input: {
        fromComponentId: "my-project-database"
        fromField: "authentication"
        fromVersion: "~1.0"
        toComponentId: "my-project-app"
        toField: "database"
        toVersion: "~2.0"
      }
    ) {
      result { id fromField toField }
      successful
    }
  }
  ```
  """
  linkComponents(
    "Your organization's unique identifier."
    organizationId: ID!

    "Create a link between two components in a project's blueprint. Links connect an output field on the source component to an input field on the destination component, establishing data flow between infrastructure resources."
    input: LinkComponentsInput!
  ): LinkPayload @inputs(name: "linkComponents", schema: "\/graphql\/v1\/inputs\/linkComponents.json", ui: "\/graphql\/v1\/inputs\/linkComponents.ui.json")

  """
  Remove a link between two components.

  Deletes the design-time dependency. Existing connections in deployed
  environments are not affected until the next deployment.
  """
  unlinkComponents(
    "Your organization's unique identifier."
    organizationId: ID!

    "The link ID to remove."
    id: ID!
  ): LinkPayload

  "Set the pixel position of a component on the visual canvas."
  setComponentPosition(
    "Your organization's unique identifier."
    organizationId: ID!

    "The component ID to reposition (e.g., `myproj-database`)."
    id: ID!

    "Set the position of a component on the canvas."
    input: SetComponentPositionInput!
  ): ComponentPayload @inputs(name: "setComponentPosition", schema: "\/graphql\/v1\/inputs\/setComponentPosition.json", ui: "\/graphql\/v1\/inputs\/setComponentPosition.ui.json")

  """
  Accept a pending group invitation.

  Accepting an invitation makes you a member of the group and grants you whatever access
  the group provides. The invitation is consumed and removed from your pending invitations
  list. You must be the recipient of the invitation (matched by email) to accept it.
  """
  acceptGroupInvite(
    "The invitation's unique identifier."
    id: ID!
  ): InviteViewerPayload

  """
  Upload or replace your profile avatar.

  Accepts PNG, JPG, GIF, or WebP images up to 1 MB. If you already have an avatar, it is
  replaced. The avatar is served at a stable URL that does not change when the image is updated.
  """
  setAccountAvatar(
    "The image file to upload (PNG, JPG, GIF, or WebP, max 1 MB)."
    avatar: Upload!
  ): AvatarViewerPayload

  """
  Remove your profile avatar.

  Deletes the current avatar image. After removal, the `avatar` field on your viewer profile
  returns `null`.
  """
  removeAccountAvatar: AvatarViewerPayload

  """
  Create a new group in your organization.

  New groups are created with the `CUSTOM` role by default, allowing you to assign
  project-level access grants after creation. Requires `organization_admin` permissions.
  """
  createGroup(
    "Your organization's unique identifier."
    organizationId: ID!

    "Create a new group. Groups control which projects members can access."
    input: CreateGroupInput!
  ): GroupPayload @inputs(name: "createGroup", schema: "\/graphql\/v1\/inputs\/createGroup.json", ui: "\/graphql\/v1\/inputs\/createGroup.ui.json")

  """
  Update a group's name or description.

  Only the `name` and `description` fields can be modified. The group's role cannot be
  changed after creation. Requires `organization_admin` permissions.
  """
  updateGroup(
    "Your organization's unique identifier."
    organizationId: ID!

    "The group's unique identifier."
    id: ID!

    "Update a group's name or description."
    input: UpdateGroupInput!
  ): GroupPayload @inputs(name: "updateGroup", schema: "\/graphql\/v1\/inputs\/updateGroup.json", ui: "\/graphql\/v1\/inputs\/updateGroup.ui.json")

  """
  Delete a group.

  Only groups with the `CUSTOM` role can be deleted. The built-in `organization_admin` and
  `organization_viewer` groups are permanent and cannot be removed. All members lose the
  access granted by this group immediately upon deletion. Requires `organization_admin` permissions.
  """
  deleteGroup(
    "Your organization's unique identifier."
    organizationId: ID!

    "The group's unique identifier."
    id: ID!
  ): GroupPayload

  """
  Invite a user to a group by email address.

  Sends an email invitation to the specified address. If the user already has a Massdriver
  account, the invitation appears in their pending invites (see the `viewer` query). If they
  don't have an account yet, they'll be prompted to sign up when they accept.

  Requires `organization_admin` permissions.
  """
  createGroupInvitation(
    "Your organization's unique identifier."
    organizationId: ID!

    "The group to invite the user to."
    groupId: ID!

    "Email address of the user to invite."
    email: String!
  ): GroupInvitationPayload

  """
  Revoke a pending invitation.

  Removes the invitation so the user can no longer accept it. Has no effect if the invitation
  was already accepted. Requires `organization_admin` permissions.
  """
  deleteGroupInvitation(
    "Your organization's unique identifier."
    organizationId: ID!

    "The group the invitation belongs to."
    groupId: ID!

    "Email address of the invitation to revoke."
    email: String!
  ): GroupInvitationPayload

  """
  Remove a member from a group.

  The member immediately loses any access granted by this group. If this was their only
  group in the organization, they lose all access to the organization.
  Requires `organization_admin` permissions.
  """
  deleteGroupMember(
    "Your organization's unique identifier."
    organizationId: ID!

    "The group to remove the member from."
    groupId: ID!

    "Email address of the member to remove."
    email: String!
  ): GroupMemberPayload

  """
  Create a new tag constraint in your organization.

  Once created, the constraint immediately applies to new resources at the specified scope.
  Existing resources are not retroactively validated.
  """
  createOrganizationTagConstraint(
    "Your organization's unique identifier."
    organizationId: ID!

    "Define a structural tag constraint for your organization. Tag constraints control which tags can be set on resources at each level of the hierarchy."
    input: CreateOrganizationTagConstraintInput!
  ): OrganizationTagConstraintPayload @inputs(name: "createOrganizationTagConstraint", schema: "\/graphql\/v1\/inputs\/createOrganizationTagConstraint.json", ui: "\/graphql\/v1\/inputs\/createOrganizationTagConstraint.ui.json")

  """
  Delete a tag constraint from your organization.

  Removing a constraint stops enforcing the rule for future resources. Existing tags
  on resources are not removed.
  """
  deleteOrganizationTagConstraint(
    "Your organization's unique identifier."
    organizationId: ID!

    "The identifier of the tag constraint to delete."
    id: ID!
  ): OrganizationTagConstraintPayload

  """
  Create a new organization. You become the owner and first admin automatically.

  The `id` in the input becomes the organization's permanent identifier and cannot be
  changed after creation.
  """
  createOrganization(
    "Create a new organization. An organization is the top-level container for all your projects, environments, and infrastructure resources."
    input: CreateOrganizationInput!
  ): OrganizationPayload @inputs(name: "createOrganization", schema: "\/graphql\/v1\/inputs\/createOrganization.json", ui: "\/graphql\/v1\/inputs\/createOrganization.ui.json")

  """
  Upload or replace your organization's logo.

  Accepts PNG, JPG, GIF, or WebP images up to 1 MB. If a logo already exists,
  it is replaced. Use `removeOrganizationLogo` to delete without replacement.
  """
  setOrganizationLogo(
    "Your organization's unique identifier."
    organizationId: ID!

    "The image file to upload (PNG, JPG, GIF, or WebP, max 1 MB)."
    logo: Upload!
  ): LogoOrganizationPayload

  "Remove your organization's logo. Returns the deleted logo's metadata, or `null` if none existed."
  removeOrganizationLogo(
    "Your organization's unique identifier."
    organizationId: ID!
  ): LogoOrganizationPayload

  """
  Remove a member from the organization.

  This revokes all group memberships and cancels any pending invitations for the
  specified email address. The member immediately loses access to all organization resources.
  """
  deleteOrganizationMember(
    "Your organization's unique identifier."
    organizationId: ID!

    "Email address of the member to remove."
    email: String!
  ): DeletedOrganizationMemberPayload

  """
  Create and activate an integration for your organization.

  Configures a new integration of the specified type. The `config` and `auth` fields
  must conform to the JSON schemas returned by `integrationTypes`. Returns an
  `IntegrationActivation` with one-time setup instructions that may include sensitive
  credentials.

  Each organization can have at most one integration per type.

  ```graphql
  mutation {
    createIntegration(
      organizationId: "my-org"
      id: "aws-cost-and-usage-reports"
      input: {
        config: "{\"bucket\": \"my-cur-bucket\", \"region\": \"us-east-1\"}"
        auth: "{\"roleArn\": \"arn:aws:iam::123456789012:role/MassdriverCUR\"}"
      }
    ) {
      result {
        id
        status
        instructions
      }
      successful
      messages { field message }
    }
  }
  ```
  """
  createIntegration(
    "Your organization's unique identifier."
    organizationId: ID!

    "The integration type to configure (e.g., `\"aws-cost-and-usage-reports\"`)."
    id: ID!

    "Create and activate an integration for your organization. The config and auth payloads must conform to the integration type's configSchema and authSchema respectively."
    input: CreateIntegrationInput!
  ): IntegrationActivationPayload @inputs(name: "createIntegration", schema: "\/graphql\/v1\/inputs\/createIntegration.json", ui: "\/graphql\/v1\/inputs\/createIntegration.ui.json")

  """
  Re-enable a disabled integration.

  Runs the integration's activation process again and resumes its execution schedule.
  Returns an `IntegrationActivation` with updated setup instructions. The integration
  must currently be in `disabled` status.
  """
  enableIntegration(
    "Your organization's unique identifier."
    organizationId: ID!

    "The integration type identifier to enable."
    id: ID!
  ): IntegrationActivationPayload

  """
  Disable an active integration.

  Stops the integration's execution schedule and runs its deactivation process.
  The integration configuration is preserved and can be re-enabled later with
  `enableIntegration`. The integration must currently be in `enabled` status.
  """
  disableIntegration(
    "Your organization's unique identifier."
    organizationId: ID!

    "The integration type identifier to disable."
    id: ID!
  ): IntegrationPayload

  """
  Permanently delete an integration.

  Disables the integration if it is currently active, then removes the configuration
  entirely. This action cannot be undone — to reconnect, you will need to create the
  integration again with `createIntegration`.
  """
  deleteIntegration(
    "Your organization's unique identifier."
    organizationId: ID!

    "The integration type identifier to delete."
    id: ID!
  ): IntegrationPayload

  """
  Create a scoped, time-limited access token.

  Accounts create personal access tokens for themselves; service accounts create tokens for
  their own identity. An organization admin can additionally create a token on behalf of a
  service account by passing `serviceAccountId` — account-to-account delegation is not supported.

  The `token` field in the response contains the full bearer token value — **it is only
  shown once**. Store it securely before navigating away. If you lose it, revoke the
  token and create a new one.

  Defaults to a 60-minute expiration if `expiresInMinutes` is not specified.

  **Example:**

  ```graphql
  mutation {
    createAccessToken(
      organizationId: "my-org"
      input: { name: "deploy-token", scopes: ["*"], expiresInMinutes: 30 }
    ) {
      result {
        id
        token
        prefix
        expiresAt
      }
      successful
      messages { field message }
    }
  }
  ```
  """
  createAccessToken(
    "Your organization's unique identifier."
    organizationId: ID!

    "Create a scoped, time-limited access token for API authentication."
    input: CreateAccessTokenInput!
  ): AccessTokenWithValuePayload @inputs(name: "createAccessToken", schema: "\/graphql\/v1\/inputs\/createAccessToken.json", ui: "\/graphql\/v1\/inputs\/createAccessToken.ui.json")

  """
  Revoke an access token.

  Only the owning subject can revoke a token — organization admins cannot revoke another
  user's personal tokens. The token immediately stops working for all API requests. The
  token record is preserved with a `revokedAt` timestamp for audit purposes. Revoking an
  already-revoked or expired token is a no-op that returns the existing record.
  """
  revokeAccessToken(
    "Your organization's unique identifier."
    organizationId: ID!

    "The access token's unique identifier."
    id: ID!
  ): AccessTokenPayload

  """
  Create a new service account in your organization.

  Returns the service account with its `secret` token. **The secret is only included in this
  response** — store it immediately in a secure location (e.g., a secrets manager or CI/CD
  environment variable). If you lose the secret, you must delete the service account and
  create a new one.

  The new service account has no permissions until you add it to a group.
  Requires `organization_admin` permissions.

  **Example:**

  ```graphql
  mutation {
    createServiceAccount(
      organizationId: "my-org"
      input: { name: "ci-deploy-bot", description: "GitHub Actions deployer" }
    ) {
      result {
        id
        name
        secret
      }
      successful
      messages { field message }
    }
  }
  ```
  """
  createServiceAccount(
    "Your organization's unique identifier."
    organizationId: ID!

    "Create a new service account for programmatic API access."
    input: CreateServiceAccountInput!
  ): ServiceAccountWithSecretPayload @inputs(name: "createServiceAccount", schema: "\/graphql\/v1\/inputs\/createServiceAccount.json", ui: "\/graphql\/v1\/inputs\/createServiceAccount.ui.json")

  """
  Permanently delete a service account.

  This immediately revokes all API access for this service account, including any active
  access tokens. All group memberships are removed. This action cannot be undone.
  Requires `organization_admin` permissions.
  """
  deleteServiceAccount(
    "Your organization's unique identifier."
    organizationId: ID!

    "The service account's unique identifier."
    id: ID!
  ): ServiceAccountPayload

  """
  Add a service account to a group, granting it the group's access level.

  The service account immediately gains all permissions associated with the group's role.
  A service account can belong to multiple groups — its effective permissions are the union
  of all group permissions. Requires `organization_admin` permissions.
  """
  addServiceAccountToGroup(
    "Your organization's unique identifier."
    organizationId: ID!

    "The service account to add."
    serviceAccountId: ID!

    "The group to add the service account to."
    groupId: ID!
  ): ServiceAccountGroupPayload

  """
  Remove a service account from a group.

  The service account immediately loses all permissions granted by this group. If this was
  its only group, the service account retains its identity but has no access to any resources.
  Requires `organization_admin` permissions.
  """
  removeServiceAccountFromGroup(
    "Your organization's unique identifier."
    organizationId: ID!

    "The service account to remove."
    serviceAccountId: ID!

    "The group to remove the service account from."
    groupId: ID!
  ): ServiceAccountGroupPayload

  """
  Set a remote reference on an instance, linking one of its resource fields to an
  external resource.

  The target resource can be from another project or an imported resource. The instance
  must **not** be in `PROVISIONED` or `FAILED` status — you can only set remote references
  on instances that haven't been deployed yet or have been decommissioned.

  If this is the first remote reference on the instance, the instance status transitions
  to `EXTERNAL`.

  ```graphql
  mutation {
    setRemoteReference(
      organizationId: "my-org"
      instanceId: "my-app"
      resourceId: "shared-creds-abc123"
      input: { field: "aws_authentication" }
    ) {
      result { id field resource { id name } }
      successful
      messages { field message }
    }
  }
  ```
  """
  setRemoteReference(
    "Your organization's unique identifier."
    organizationId: ID!

    "The instance to set the remote reference on."
    instanceId: ID!

    "The resource to reference — either a UUID for imported resources or 'instance.field' for provisioned resources."
    resourceId: ID!

    "Link an instance's resource field to a resource from another project or an imported resource. The instance must not be in a provisioned or failed state."
    input: SetRemoteReferenceInput!
  ): RemoteReferencePayload @inputs(name: "setRemoteReference", schema: "\/graphql\/v1\/inputs\/setRemoteReference.json", ui: "\/graphql\/v1\/inputs\/setRemoteReference.ui.json")

  """
  Remove a remote reference from an instance.

  The reference can only be removed if no other provisioned instances depend on the
