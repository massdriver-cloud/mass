  "The field to order results by."
  field: OciRepoReleaseChannelsSortField!

  "Ascending (`ASC`) or descending (`DESC`)."
  order: SortOrder!
}

"""
A release channel within an OCI repository.

Release channels are auto-resolving version constraints. Each channel points to
the latest published tag that matches its constraint. As new versions are
published, channels automatically update to point to the newest match.

For example, channel `~1` always resolves to the highest `1.x.x` stable tag.
If `1.2.3` is the latest, the channel points there. When `1.3.0` is published,
the channel automatically advances.
"""
type OciRepoReleaseChannel {
  "The channel constraint expression (e.g., `~1`, `~1.2`, `latest`, `latest+dev`)."
  name: ReleaseChannel!

  "The fully resolved semver version this channel currently points to."
  tag: Semver!
}

"""
A published version tag in an OCI repository.

Each tag corresponds to a single bundle release. Tags are immutable -- once
a version is published, its contents cannot change. Development tags use
a `-dev.TIMESTAMP` suffix (e.g., `1.2.3-dev.20060102T150405Z`).
"""
type OciRepoTag {
  "The semantic version string (e.g., `1.2.3` or `1.2.3-dev.20060102T150405Z`)."
  tag: Semver!

  "Timestamp when this version was published (UTC)."
  createdAt: DateTime!

  """
  The [OCI manifest media type](https://github.com/opencontainers/image-spec/blob/main/manifest.md)
  wrapping this tag. Currently always
  `application/vnd.oci.image.manifest.v1+json`. The artifact type the
  manifest describes is available on `OciRepo.artifactType`.
  """
  mediaType: String!

  """
  Content-addressable digest of this tag's manifest, in the form
  `sha256:<hex>` (for example, `sha256:e3b0c4...`). Combine with
  `OciRepo.reference` as `@<digest>` to pin a pull to this exact manifest.
  """
  digest: String!

  "Size of the manifest blob in bytes."
  size: Int!
}

"""
An OCI repository in your organization's bundle catalog.

An OCI repository is the container for all published versions of a single
infrastructure-as-code package. It is analogous to a Docker image repository
but for Massdriver bundles.

Each repository has a unique `name` (e.g., `aws-aurora-postgres`) and contains:

- **Tags** -- the individual published versions (`1.0.0`, `1.1.0`, `1.2.3`, etc.)
- **Release channels** -- auto-resolving version constraints (`latest`, `~1`, `~1.2`)
  that always point to the newest matching tag

To fetch a specific bundle version from a repository, use the `bundle` query
with a `BundleId` like `aws-aurora-postgres@1.2.3` or `aws-aurora-postgres@~1`.
"""
type OciRepo {
  id: ID!

  "Repository name, unique within your organization (e.g., `aws-aurora-postgres`)."
  name: OciRepoName!

  """
  The bare [OCI reference](https://github.com/opencontainers/distribution-spec/blob/main/spec.md#pulling-manifests)
  for this repository: `<registry>/<org>/<repo>` (for example,
  `api.massdriver.cloud/acme/aws-aurora-postgres`).

  Append `:<tag>` or `@<digest>` to address a specific manifest and use the
  result directly with `oras`, `docker`, or any OCI-compliant client:

  ```bash
  oras pull api.massdriver.cloud/acme/aws-aurora-postgres:1.2.3
  ```
  """
  reference: String!

  """
  The [OCI artifact type](https://github.com/opencontainers/image-spec/blob/main/manifest.md#guidelines-for-artifact-usage)
  stored in this repository. Currently always
  `application/vnd.massdriver.bundle.v1+json`.
  """
  artifactType: String!

  "Timestamp when this repository was created (UTC)."
  createdAt: DateTime!

  "Timestamp when this repository was last modified (UTC)."
  updatedAt: DateTime!

  """
  Short summary of what this repository provisions, taken from the latest
  published release. `null` when the repository has no releases yet or the
  author omitted the description.
  """
  description: String

  """
  URL to this repository's display icon (SVG), taken from the latest
  published release. `null` when the repository has no releases yet or the
  latest release has no icon.

  The URL is **authenticated** — callers must have an active browser session
  or valid API credentials for the owning organization. Embedding it in an
  `<img>` tag from the web UI works because the browser sends the session
  cookie automatically; programmatic clients must include an `Authorization`
  header.
  """
  icon: String

  """
  URL of the source code this repository is published from (for example, a
  GitHub link), when the author provides one. Taken from the latest release.
  """
  sourceUrl: String

  """
  Markdown README for this repository. Cached on publish from the latest
  stable release; falls back to the latest release when the cache is empty.
  `null` when the repository has no releases or the latest release has no
  README.
  """
  readme: String

  """
  Markdown changelog for this repository. Cached on publish from the latest
  stable release; falls back to the latest release when the cache is empty.
  `null` when the repository has no releases or the latest release has no
  changelog.
  """
  changelog: String

  """
  Paginated list of release channels for this repository.

  Each channel is a version constraint that auto-resolves to the latest matching
  tag. Use the `stable` filter to show only stable or only development channels.
  """
  releaseChannels(
    "Filter by stable or development channels."
    filter: OciRepoReleaseChannelsFilter

    "Sort order for channels. Defaults to `name` ascending."
    sort: OciRepoReleaseChannelsSort

    "Cursor from a previous page's `cursor.next` or `cursor.previous`."
    cursor: Cursor
  ): OciRepoReleaseChannelsPage

  """
  Paginated list of published version tags in this repository.

  Each tag represents a single immutable bundle release. Defaults to newest
  version first (`version` descending).
  """
  tags(
    "Sort order for tags. Defaults to `version` descending (newest first)."
    sort: OciRepoTagsSort

    "Cursor from a previous page's `cursor.next` or `cursor.previous`."
    cursor: Cursor
  ): OciRepoTagsPage
}

type OciReposPage {
  "Pagination cursors for navigating between pages."
  cursor: PaginationCursor!

  "A list of type oci_repo."
  items: [OciRepo]
}

type OciRepoTagsPage {
  "Pagination cursors for navigating between pages."
  cursor: PaginationCursor!

  "A list of type oci_repo_tag."
  items: [OciRepoTag]
}

type OciRepoReleaseChannelsPage {
  "Pagination cursors for navigating between pages."
  cursor: PaginationCursor!

  "A list of type oci_repo_release_channel."
  items: [OciRepoReleaseChannel]
}

"""
One leaf value in a params comparison, captured for a single side.

`present` indicates whether the key exists on this side:
- `present: false` means the key is missing entirely.
- `present: true, value: null` means the key exists with a JSON `null` value.
- `present: true, value: "..."` means the key exists with the given value.

`value` is a display string — for non-string leaves (numbers, booleans,
arrays), the value is rendered as text (`"5432"`, `"true"`, `"[1,2,3]"`).
Use the corresponding `paramDimensions` entry or the bundle schema for
the original type.
"""
type ParamValue {
  "Whether a value exists at this path on this side of the comparison."
  present: Boolean!

  "Display-ready string form of the leaf value. `null` when the key is missing or its value is JSON `null` — disambiguate with `present`."
  value: String
}

"""
A single leaf-level comparison between two params maps.

The list of `ParamComparison` entries returned by a comparison query is flat:
every entry is a terminal leaf (maps and arrays are walked to the bottom).
Use `equal` to filter to only the entries that differ.
"""
type ParamComparison {
  "jq-style path to this leaf value, e.g. `.database.port` or `.containers[0].image`. Paths are stable across both sides of the comparison."
  path: String!

  "The value (or absence) on the source side of the comparison."
  source: ParamValue!

  "The value (or absence) on the target side of the comparison."
  target: ParamValue!

  "`true` when both sides have the same presence and the same value. `false` when either the key is only on one side or the values differ."
  equal: Boolean!
}

"""
A comparison of a single version string between two sides.

`source` and `target` may each be `null` when the corresponding side has no
version to report (e.g., an instance that exists on one side of an
environment comparison but not the other).
"""
type VersionComparison {
  "The version on the source side, or `null` if no version applies."
  source: String

  "The version on the target side, or `null` if no version applies."
  target: String

  "`true` when both sides have the same version string (including both being `null`)."
  equal: Boolean!
}

"""
A single cost data point containing an amount and its currency.

Both `amount` and `currency` are nullable. A `null` amount means Massdriver has no cost
data for the requested period -- this is normal for newly provisioned resources or when
cloud provider billing data has not yet been ingested. When data is present, `amount` is
always a positive float and `currency` is an ISO 4217 code (e.g., `USD`, `EUR`).
"""
type CostSample {
  "The cost in the given currency. Null when no billing data is available for this period."
  amount: Float

  "ISO 4217 currency code (e.g., `USD`). Null when no billing data is available."
  currency: String
}

"""
Aggregated cloud-provider cost metrics for a project or environment.

Cost data is sourced from your cloud provider's billing APIs and refreshed periodically.
Each metric is a `CostSample` containing an amount and currency. All four metrics are
always present, but their inner `amount` and `currency` may be null if billing data has
not yet been ingested.

- **last_month** -- Total spend for the most recent complete billing cycle.
- **monthly_average** -- Average monthly spend across all available billing cycles.
- **last_day** -- Total spend for the most recent 24-hour period.
- **daily_average** -- Average daily spend over the last 7 days.
"""
type CostSummary {
  "Total cost for the most recent complete billing cycle."
  lastMonth: CostSample!

  "Average monthly cost across all available billing cycles."
  monthlyAverage: CostSample!

  "Total cost for the most recent 24-hour period."
  lastDay: CostSample!

  "Average daily cost over the last 7 days."
  dailyAverage: CostSample!
}

"""
A specific condition that prevents a resource from being deleted.

Each constraint identifies the **blocking resource** (by type and id) and provides a
human-readable message explaining what must be resolved before deletion can proceed.
For example, an environment cannot be deleted while it contains provisioned instances,
and a project cannot be deleted while it has environments.

To resolve a constraint, address the blocking condition described in `message` -- typically
by decommissioning or removing the resource identified by `type` and `id`.
"""
type DeletionConstraint {
  "Human-readable explanation of why deletion is blocked."
  message: String!

  "The kind of resource causing the block (e.g., `package`, `environment`)."
  type: String!

  "The identifier of the blocking resource."
  id: String!
}

"""
Lifecycle check indicating whether a resource can safely be deleted.

Before deleting a project or environment, query this field to determine if deletion is
allowed. When `result` is `false`, the `constraints` list explains exactly what is
blocking deletion and which resources need to be resolved first.

A resource is deletable only when **all** of the following are true:
- No child instances are provisioned or in a failed state
- No deployments are currently pending or running
- No dependent child resources exist (e.g., environments in a project, forks of an environment)
"""
type Deletable {
  "Whether the resource can be safely deleted right now."
  result: Boolean!

  "The list of conditions preventing deletion. Empty when `result` is `true`."
  constraints: [DeletionConstraint]
}

"""
Sort direction for ordering paginated results.

Applied via the `sort` argument on any list query. When combined with a sort field,
controls the ordering of returned items.
"""
enum SortOrder {
  "Ascending order (A-Z, oldest first, lowest first)"
  ASC

  "Descending order (Z-A, newest first, highest first)"
  DESC
}

"""
Filter by an identifier field.

All operators within a single filter are combined with **AND**. To match any of
several values, use the `in` operator rather than multiple `eq` filters.

```graphql
# Exact match
{ "id": { "eq": "my-resource" } }

# Match several IDs (logical OR between values)
{ "id": { "in": ["resource-a", "resource-b"] } }
```
"""
input IdFilter {
  "Return only results whose ID exactly equals this value."
  eq: ID

  "Return results whose ID matches any value in this list."
  in: [ID!]
}

"""
Filter by a string field.

All operators within a single filter are combined with **AND**. To match any of
several values, use the `in` operator rather than multiple `eq` filters.

```graphql
# Exact match
{ "name": { "eq": "production" } }

# Match several values (logical OR between values)
{ "name": { "in": ["production", "staging"] } }
```
"""
input StringFilter {
  "Return only results whose value exactly equals this string."
  eq: String

  "Return results whose value matches any string in this list."
  in: [String!]
}

"""
Filter by OCI repository name (the bundle's package identifier).

Supports exact match, set membership, and prefix matching. Prefix matching is
useful for filtering by cloud provider (e.g., `"aws-"`) or category.

```graphql
# All AWS bundles
{ "ociRepoName": { "startsWith": "aws-" } }

# Specific bundles
{ "ociRepoName": { "in": ["aws-aurora-postgres", "gcp-cloud-sql"] } }
```
"""
input OciRepoNameFilter {
  "Return only results whose OCI repository name exactly equals this value."
  eq: OciRepoName

  "Return results whose OCI repository name matches any value in this list."
  in: [OciRepoName!]

  "Return results whose OCI repository name begins with this prefix, e.g. `\"aws-\"` matches `\"aws-aurora-postgres\"`."
  startsWith: OciRepoName
}

"""
Filter by a datetime field.

All operators within a single filter are combined with **AND**, which makes it
easy to build date range queries by combining `gte` and `lte`.

All datetime values must be in ISO 8601 format (e.g., `"2025-01-15T00:00:00Z"`).

```graphql
# Everything created in January 2025
{ "createdAt": { "gte": "2025-01-01T00:00:00Z", "lte": "2025-01-31T23:59:59Z" } }

# Everything after a specific date
{ "createdAt": { "gt": "2025-06-01T00:00:00Z" } }
```
"""
input DatetimeFilter {
  "Return only results with a datetime exactly equal to this value."
  eq: DateTime

  "Return only results with a datetime strictly after this value."
  gt: DateTime

  "Return only results with a datetime on or after this value. Combine with `lte` for date ranges."
  gte: DateTime

  "Return only results with a datetime strictly before this value."
  lt: DateTime

  "Return only results with a datetime on or before this value. Combine with `gte` for date ranges."
  lte: DateTime
}

"""
Filter by instance status.

All operators within a single filter are combined with **AND**. Use `in` to match
instances in any of several statuses.

```graphql
# All provisioned instances
{ "status": { "eq": "PROVISIONED" } }

# Instances that are provisioning or provisioned
{ "status": { "in": ["PROVISIONING", "PROVISIONED"] } }
```
"""
input InstanceStatusFilter {
  "Return only instances whose status exactly equals this value."
  eq: InstanceStatus

  "Return instances whose status matches any value in this list."
  in: [InstanceStatus!]
}

"""
Filter by deployment status.

All operators within a single filter are combined with **AND**. Use `in` to match
deployments in any of several statuses.

```graphql
{ "status": { "in": ["COMPLETED", "FAILED"] } }
```
"""
input DeploymentStatusFilter {
  "Return only deployments whose status exactly equals this value."
  eq: DeploymentStatus

  "Return deployments whose status matches any value in this list."
  in: [DeploymentStatus!]
}

"""
Filter by deployment action.

All operators within a single filter are combined with **AND**. Use `in` to match
deployments triggered by any of several actions.

```graphql
{ "action": { "in": ["PROVISION", "DECOMMISSION"] } }
```
"""
input DeploymentActionFilter {
  "Return only deployments whose action exactly equals this value."
  eq: DeploymentAction

  "Return deployments whose action matches any value in this list."
  in: [DeploymentAction!]
}

"""
Filter instances by the value of a configuration parameter at a specific JSON path.

Parameter dimensions let you slice your infrastructure by any value in an instance's
configuration — for example, filtering by database engine, instance size, or region.
Use the `paramDimensions` query to discover which dimensions are available for your
instances.

```graphql
# All instances using "db.r5.xlarge"
{
  "params": {
    "dimension": ".database.instance_type",
    "eq": "db.r5.xlarge"
  }
}

# All instances whose region contains "us-east"
{
  "params": {
    "dimension": ".region",
    "contains": "us-east"
  }
}
```
"""
input ParamDimensionFilter {
  "jq-style path to the configuration parameter (e.g., `\".database.instance_type\"` or `\".containers[0].image\"`). Use the `paramDimensions` query to discover available paths."
  dimension: String!

  "Return only instances whose parameter value exactly equals this string."
  eq: String

  "Return instances whose parameter value matches any string in this list."
  in: [String!]

  "Return instances whose parameter value contains this substring (case-insensitive)."
  contains: String
}

"""
Cursor-based pagination input for list queries.

Use `limit` to control page size and `next`/`previous` cursors to navigate between
pages. Cursors are opaque strings returned in the response's `cursor` field — pass
them back exactly as received to fetch the adjacent page.

```graphql
# First page (20 items by default)
query { instances(organizationId: "my-org") { cursor { next } items { id } } }

# Next page
query { instances(organizationId: "my-org", cursor: { next: "eyJpZCI6..." }) { cursor { next } items { id } } }

# Custom page size
query { instances(organizationId: "my-org", cursor: { limit: 50 }) { cursor { next } items { id } } }
```
"""
input Cursor {
  "Maximum number of items to return per page. Default: **20**. Minimum: **1**. Maximum: **100**."
  limit: Int

  "Forward pagination cursor. Pass the `next` value from a previous response to fetch the next page. Mutually exclusive with `previous`."
  next: String

  "Backward pagination cursor. Pass the `previous` value from a previous response to fetch the preceding page. Mutually exclusive with `next`."
  previous: String
}

"""
Pagination cursors returned with every paginated response.

Contains opaque cursor strings for navigating forward and backward through results.
A `null` value for `next` indicates you have reached the last page; a `null` value
for `previous` indicates you are on the first page.
"""
type PaginationCursor {
  "Cursor for the next page. `null` if there are no more results."
  next: String

  "Cursor for the previous page. `null` if this is the first page."
  previous: String
}

"A JSON object (key-value map) encoded as a string. Accepts only `{}` objects — arrays, strings, numbers, booleans, and `null` are rejected. Pass values as a JSON-encoded string, e.g. `{\"key\": \"value\"}`. Used for dynamic configuration data like integration configs, parameter overrides, and schemas."
scalar Map

type ValidationOption {
  "The name of a variable to be subsituted in a validation message template"
  key: String!

  "The value of a variable to be substituted in a validation message template"
  value: String!
}

"""
Validation messages are returned when mutation input does not meet the requirements.
  While client-side validation is highly recommended to provide the best User Experience,
  All inputs will always be validated server-side.

  Some examples of validations are:

  * Username must be at least 10 characters
  * Email field does not contain an email address
  * Birth Date is required

  While GraphQL has support for required values, mutation data fields are always
  set to optional in our API. This allows 'required field' messages
  to be returned in the same manner as other validations. The only exceptions
  are id fields, which may be required to perform updates or deletes.
"""
type ValidationMessage {
  """
  The input field that the error applies to. The field can be used to
  identify which field the error message should be displayed next to in the
  presentation layer.

  If there are multiple errors to display for a field, multiple validation
  messages will be in the result.

  This field may be null in cases where an error cannot be applied to a specific field.
  """
  field: String

  """
  A friendly error message, appropriate for display to the end user.

  The message is interpolated to include the appropriate variables.

  Example: `Username must be at least 10 characters`

  This message may change without notice, so we do not recommend you match against the text.
  Instead, use the *code* field for matching.
  """
  message: String

  "A unique error code for the type of validation used."
  code: String!

  """
  A template used to generate the error message, with placeholders for option substiution.

  Example: `Username must be at least {count} characters`

  This message may change without notice, so we do not recommend you match against the text.
  Instead, use the *code* field for matching.
  """
  template: String

  "A list of substitutions to be applied to a validation message template"
  options: [ValidationOption]
}

"Represents an uploaded file."
scalar Upload

"""
The `DateTime` scalar type represents a date and time in the UTC
timezone. The DateTime appears in a JSON response as an ISO8601 formatted
string, including UTC timezone ("Z"). The parsed date and time string will
be converted to UTC if there is an offset.
"""
scalar DateTime
