"""
A fully resolved [semantic version](https://semver.org/) string.

This scalar always represents a concrete, published version -- never a constraint
or channel. It appears wherever the API returns or accepts an exact version.

**Stable versions** follow the `MAJOR.MINOR.PATCH` pattern:

    1.2.3

**Development versions** append a `-dev.TIMESTAMP` pre-release suffix:

    1.2.3-dev.20060102T150405Z

If you need to specify a version range or auto-resolving channel instead of an
exact version, use the `ReleaseChannel` or `VersionConstraint` scalars.
"""
scalar Semver

"""
A composite bundle identifier in **`name@version`** format.

This scalar uniquely identifies a bundle by combining its OCI repository name
with a version specifier. As an **output** the version portion is always a
fully resolved semver string:

    aws-aurora-postgres@1.2.3
    aws-aurora-postgres@1.2.3-dev.20060102T150405Z

As an **input** (e.g., in the `bundle` query), you can use any of the following
formats and the server will resolve to the best matching published version:

| Format | Example | Resolves to |
|--------|---------|-------------|
| Bare name | `aws-aurora-postgres` | Latest stable (or latest dev if no stable exists) |
| Exact version | `aws-aurora-postgres@1.2.3` | That exact version |
| Major channel | `aws-aurora-postgres@~1` | Latest `1.x.x` stable |
| Minor channel | `aws-aurora-postgres@~1.2` | Latest `1.2.x` stable |
| Latest stable | `aws-aurora-postgres@latest` | Newest stable release |
| Latest + dev | `aws-aurora-postgres@latest+dev` | Newest release including dev builds |
"""
scalar BundleId

"""
A release channel identifier for automatic version tracking.

Release channels are version constraints that always resolve to the latest
matching published version. When you pin a component to a release channel,
it automatically picks up new compatible versions as they are published.

**Stable channels** (exclude development builds):

| Channel | Matches |
|---------|---------|
| `latest` | Newest stable release across all major versions |
| `~1` | Latest minor + patch in the `1.x.x` series |
| `~1.2` | Latest patch in the `1.2.x` series |

**Development channels** (include `-dev.*` pre-release builds):

| Channel | Matches |
|---------|---------|
| `latest+dev` | Newest release of any kind |
| `~1+dev` | Latest in `1.x.x` including dev builds |
| `~1.2+dev` | Latest in `1.2.x` including dev builds |
"""
scalar ReleaseChannel

"""
A union of exact versions and release channels.

Use this scalar anywhere you need to specify either a pinned version or an
auto-resolving channel. It accepts every format that `Semver` and
`ReleaseChannel` accept:

**Exact versions:**

- `1.2.3` -- a specific stable release
- `1.2.3-dev.20060102T150405Z` -- a specific development build

**Release channels:**

- `latest` -- newest stable release
- `latest+dev` -- newest release including dev builds
- `~1` -- latest minor + patch in the `1.x.x` series
- `~1.2` -- latest patch in the `1.2.x` series
- `~1+dev` / `~1.2+dev` -- same ranges including dev builds

This is the most permissive version scalar. Use `Semver` when only exact
versions are valid, or `ReleaseChannel` when only channels are valid.
"""
scalar VersionConstraint

